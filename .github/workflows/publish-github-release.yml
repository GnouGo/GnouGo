name: Publish GitHub Release

on:
  workflow_call:
    inputs:
      version_tag:
        description: Git tag used for the release.
        required: true
        type: string
      channel_tag:
        description: Release channel classification from the version job.
        required: true
        type: string
    secrets:
      WINGET_CREATE_GITHUB_TOKEN:
        description: GitHub token used by wingetcreate to submit the WinGet package update.
        required: true
      HOMEBREW_TAP_GITHUB_TOKEN:
        description: GitHub token with write access to GnouGo/homebrew-tap.
        required: true

permissions:
  contents: write

env:
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"

jobs:
  publish_release_main:
    name: Publish Release (${{ inputs.version_tag }})
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "!*.dockerbuild"
          path: release-assets

      - name: Generate release checksums
        shell: pwsh
        run: |
          $files = Get-ChildItem release-assets -Recurse -File | Where-Object {
            $_.Name -match '\.(zip|tar\.gz|dmg|msi|deb)$'
          } | Sort-Object Name

          if (-not $files) {
            throw "No release archives were found under release-assets."
          }

          $lines = foreach ($file in $files) {
            $hash = (Get-FileHash -Algorithm SHA256 $file.FullName).Hash.ToLower()
            "$hash  $($file.Name)"
          }

          $lines | Set-Content -Path "release-assets/checksums.txt" -Encoding utf8

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version_tag }}
          name: ${{ inputs.version_tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          prerelease: ${{ inputs.channel_tag != 'release' }}
          files: |
            release-assets/**/*.zip
            release-assets/**/*.tar.gz
            release-assets/**/*.dmg
            release-assets/**/*.msi
            release-assets/**/*.deb
            release-assets/checksums.txt

  publish_winget:
    name: Publish WinGet package (${{ inputs.version_tag }})
    needs: publish_release_main
    runs-on: windows-latest
    steps:
      - name: Install wingetcreate
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://aka.ms/wingetcreate/latest" -OutFile "wingetcreate.exe"

      - name: Publish WinGet package
        shell: pwsh
        env:
          WINGET_CREATE_GITHUB_TOKEN: ${{ secrets.WINGET_CREATE_GITHUB_TOKEN }}
        run: |
          $version = "${{ inputs.version_tag }}" -replace '^v', ''
          $releaseBaseUrl = "https://github.com/GnouGo/GnouGo/releases/download/${{ inputs.version_tag }}"
          $installerUrls = @(
            "$releaseBaseUrl/gnougo-win-x64.zip",
            "$releaseBaseUrl/gnougo-win-arm64.zip"
          )

          ./wingetcreate.exe update GnouGo.GnouGo `
            --version $version `
            --urls $installerUrls `
            --submit `
            --token $env:WINGET_CREATE_GITHUB_TOKEN

  publish_homebrew:
    name: Publish Homebrew cask (${{ inputs.version_tag }})
    needs: publish_release_main
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: "!*.dockerbuild"
          path: release-assets

      - name: Checkout Homebrew tap
        uses: actions/checkout@v4
        with:
          repository: GnouGo/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Update Homebrew cask
        shell: pwsh
        run: |
          $version = "${{ inputs.version_tag }}" -replace '^v', ''
          $armArchive = Get-ChildItem release-assets -Recurse -File -Filter "gnougo-osx-arm64.tar.gz" | Select-Object -First 1
          $intelArchive = Get-ChildItem release-assets -Recurse -File -Filter "gnougo-osx-x64.tar.gz" | Select-Object -First 1
          if (-not $armArchive -or -not $intelArchive) {
            throw "Missing macOS archives required to publish the Homebrew cask."
          }

          $armSha = (Get-FileHash -Algorithm SHA256 $armArchive.FullName).Hash.ToLower()
          $intelSha = (Get-FileHash -Algorithm SHA256 $intelArchive.FullName).Hash.ToLower()
          $caskPath = "homebrew-tap/Casks/gnougo.rb"
          New-Item -ItemType Directory -Path (Split-Path $caskPath) -Force | Out-Null
          @(
            '# Generated from the GnOuGo release workflow.',
            'cask "gnougo" do',
            "  version `"$version`"",
            '  arch arm: "arm64", intel: "x64"',
            '',
            "  sha256 arm:   `"$armSha`",",
            "         intel: `"$intelSha`"",
            '',
            '  url "https://github.com/GnouGo/GnouGo/releases/download/v#{version}/gnougo-osx-#{arch}.tar.gz"',
            '  name "gnougo"',
            '  desc "The Friendly Bear Agent"',
            '  homepage "https://github.com/GnouGo/GnouGo"',
            '',
            '  app "gnougo.app"',
            'end'
          ) | Set-Content -Path $caskPath -Encoding utf8

      - name: Push Homebrew tap update
        working-directory: homebrew-tap
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/gnougo.rb
          if git diff --cached --quiet; then
            echo "Homebrew cask is already up to date."
          else
            git commit -m "Update gnougo to ${{ inputs.version_tag }}"
            git push
          fi
