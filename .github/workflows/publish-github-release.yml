name: Publish GitHub Release

on:
  workflow_call:
    inputs:
      version_tag:
        description: Git tag used for the release.
        required: true
        type: string
      channel_tag:
        description: Release channel classification from the version job.
        required: true
        type: string

permissions:
  contents: write

env:
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"

jobs:
  publish_release_main:
    name: Publish Release (${{ inputs.version_tag }})
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Generate release checksums
        shell: pwsh
        run: |
          $files = Get-ChildItem release-assets -Recurse -File | Where-Object {
            $_.Name -match '\.(zip|tar\.gz|dmg|msi|deb)$'
          } | Sort-Object Name

          if (-not $files) {
            throw "No release archives were found under release-assets."
          }

          $lines = foreach ($file in $files) {
            $hash = (Get-FileHash -Algorithm SHA256 $file.FullName).Hash.ToLower()
            "$hash  $($file.Name)"
          }

          $lines | Set-Content -Path "release-assets/checksums.txt" -Encoding utf8

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version_tag }}
          name: ${{ inputs.version_tag }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          prerelease: ${{ inputs.channel_tag != 'release' }}
          files: |
            release-assets/**/*.zip
            release-assets/**/*.tar.gz
            release-assets/**/*.dmg
            release-assets/**/*.msi
            release-assets/**/*.deb
            release-assets/checksums.txt
