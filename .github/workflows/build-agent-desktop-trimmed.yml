name: Build Agent Desktop (Trimmed + Native AOT)

on:
  workflow_call:
    inputs:
      package_version:
        description: Version used for Linux package metadata. Defaults to the tag version or the current run number.
        required: false
        type: string
        default: ""
      publish_aot:
        description: Publish the desktop application itself with Native AOT. Bundled MCP tools keep their existing per-tool AOT settings.
        required: false
        type: boolean
        default: true

permissions:
  contents: read

env:
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"

jobs:
  desktop_aot:
    name: Desktop Build (${{ matrix.rid }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            archive: gnougo-linux-x64.tar.gz
            deb_arch: amd64
          - os: ubuntu-latest
            rid: linux-arm64
            archive: gnougo-linux-arm64.tar.gz
            deb_arch: arm64
          - os: windows-latest
            rid: win-x64
            archive: gnougo-win-x64.zip
          - os: windows-latest
            rid: win-arm64
            archive: gnougo-win-arm64.zip
          - os: macos-latest
            rid: osx-arm64
            archive: gnougo-osx-arm64.tar.gz
          - os: macos-latest
            rid: osx-x64
            archive: gnougo-osx-x64.tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Ensure OTLP proto files
        shell: pwsh
        run: |
          dotnet restore src/GnOuGo.OtlpCollector.Server/GnOuGo.OtlpCollector.Server.csproj /p:SkipClientBuild=true
          dotnet msbuild src/GnOuGo.OtlpCollector.Server/GnOuGo.OtlpCollector.Server.csproj -t:EnsureOtlpProtos /p:SkipClientBuild=true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.14.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"
          cache-dependency-path: "pnpm-lock.yaml"

      - name: Install Linux Native Toolchains
        if: matrix.os == 'ubuntu-latest' && (inputs.publish_aot || matrix.rid == 'linux-arm64')
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang zlib1g-dev
          if [ "${{ matrix.rid }}" = "linux-arm64" ]; then
            sudo apt-get install -y --no-install-recommends \
              binutils-aarch64-linux-gnu \
              gcc-aarch64-linux-gnu \
              g++-aarch64-linux-gnu \
              libc6-dev-arm64-cross \
              linux-libc-dev-arm64-cross
          fi

      - name: Validate Browser MCP (self-contained, non-AOT)
        shell: pwsh
        run: |
          dotnet publish src/GnOuGo.Browser.Mcp/GnOuGo.Browser.Mcp.csproj `
            -c Release `
            -r ${{ matrix.rid }} `
            --self-contained true `
            -o artifacts/publish/browser-mcp-aot/${{ matrix.rid }} `
            -p:PublishAot=false `
            -p:PublishTrimmed=false `
            -p:PublishSingleFile=false `
            -p:InvariantGlobalization=false `
            -p:SkipModelMetadataGeneration=true

      - name: Validate Git MCP (Native AOT)
        shell: pwsh
        run: |
          $publishArgs = @(
            'publish', 'src/GnOuGo.Git.Mcp/GnOuGo.Git.Mcp.csproj',
            '-c', 'Release',
            '-r', '${{ matrix.rid }}',
            '--self-contained', 'true',
            '-o', 'artifacts/publish/git-mcp-aot/${{ matrix.rid }}',
            '-p:PublishAot=true',
            '-p:PublishTrimmed=true',
            '-p:InvariantGlobalization=false',
            '-p:SkipModelMetadataGeneration=true'
          )
          if ('${{ matrix.rid }}' -eq 'linux-arm64') {
            $publishArgs += '-p:ObjCopyName=aarch64-linux-gnu-objcopy'
          }
          dotnet @publishArgs

      - name: Validate GitHub Copilot MCP (Native AOT)
        shell: pwsh
        run: |
          $publishArgs = @(
            'publish', 'src/GnOuGo.GithubCopilot.Mcp/GnOuGo.GithubCopilot.Mcp.csproj',
            '-c', 'Release',
            '-r', '${{ matrix.rid }}',
            '--self-contained', 'true',
            '-o', 'artifacts/publish/github-copilot-mcp-aot/${{ matrix.rid }}',
            '-p:PublishAot=true',
            '-p:PublishTrimmed=true',
            '-p:InvariantGlobalization=false',
            '-p:SkipModelMetadataGeneration=true'
          )
          if ('${{ matrix.rid }}' -eq 'linux-arm64') {
            $publishArgs += '-p:ObjCopyName=aarch64-linux-gnu-objcopy'
          }
          dotnet @publishArgs

      - name: Validate Cmd MCP (Native AOT)
        shell: pwsh
        run: |
          $publishArgs = @(
            'publish', 'src/GnOuGo.Cmd.Mcp/GnOuGo.Cmd.Mcp.csproj',
            '-c', 'Release',
            '-r', '${{ matrix.rid }}',
            '--self-contained', 'true',
            '-o', 'artifacts/publish/cmd-mcp-aot/${{ matrix.rid }}',
            '-p:PublishAot=true',
            '-p:PublishTrimmed=true',
            '-p:InvariantGlobalization=false',
            '-p:SkipModelMetadataGeneration=true'
          )
          if ('${{ matrix.rid }}' -eq 'linux-arm64') {
            $publishArgs += '-p:ObjCopyName=aarch64-linux-gnu-objcopy'
          }
          dotnet @publishArgs

      - name: Validate Document MCP (Native AOT)
        shell: pwsh
        run: |
          $publishArgs = @(
            'publish', 'src/GnOuGo.Document.Mcp/GnOuGo.Document.Mcp.csproj',
            '-c', 'Release',
            '-r', '${{ matrix.rid }}',
            '--self-contained', 'true',
            '-o', 'artifacts/publish/document-mcp-aot/${{ matrix.rid }}',
            '-p:PublishAot=true',
            '-p:PublishTrimmed=true',
            '-p:InvariantGlobalization=false',
            '-p:SkipModelMetadataGeneration=true'
          )
          if ('${{ matrix.rid }}' -eq 'linux-arm64') {
            $publishArgs += '-p:ObjCopyName=aarch64-linux-gnu-objcopy'
          }
          dotnet @publishArgs


      - name: Validate DocIngestor MCP (Native AOT)
        shell: pwsh
        run: |
          $publishArgs = @(
            'publish', 'src/GnOuGo.DocIngestor.Mcp/GnOuGo.DocIngestor.Mcp.csproj',
            '-c', 'Release',
            '-r', '${{ matrix.rid }}',
            '--self-contained', 'true',
            '-o', 'artifacts/publish/doc-ingestor-mcp-aot/${{ matrix.rid }}',
            '-p:PublishAot=true',
            '-p:PublishTrimmed=true',
            '-p:InvariantGlobalization=false',
            '-p:SkipModelMetadataGeneration=true'
          )
          if ('${{ matrix.rid }}' -eq 'linux-arm64') {
            $publishArgs += '-p:ObjCopyName=aarch64-linux-gnu-objcopy'
          }
          dotnet @publishArgs

      - name: Build UI (Vite)
        working-directory: src/GnOuGo.Agent.Server/ClientApp
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Publish Server (for static assets)
        shell: pwsh
        run: |
          dotnet publish src/GnOuGo.Agent.Server/GnOuGo.Agent.Server.csproj `
            -c Release `
            -r ${{ matrix.rid }} `
            --self-contained false `
            -o artifacts/tmp-server-assets-only `
            -p:SkipClientBuild=true `
            -p:PublishTrimmed=false `
            -p:DebugType=None `
            -p:DebugSymbols=false

      - name: Publish Desktop (Trimmed or Native AOT)
        shell: pwsh
        run: |
          $publishAot = '${{ inputs.publish_aot }}' -eq 'true'
          $rid = '${{ matrix.rid }}'
          $publishDir = "artifacts/publish/desktop/$rid"

          $commonProperties = @(
            '-p:SkipClientBuild=true',
            '-p:PublishTrimmed=true',
            '-p:InvariantGlobalization=true',
            '-p:SkipModelMetadataGeneration=true'
          )

          if ($publishAot) {
            $commonProperties += @(
              '-p:PublishAot=true',
              '-p:PublishSingleFile=false',
              '-p:DisableRazorComponentsForNativeAot=true',
              '-p:JsonSerializerIsReflectionEnabledByDefault=false',
              '-p:DebugType=None',
              '-p:DebugSymbols=false'
            )
            if ($rid -eq 'linux-arm64') {
              $commonProperties += '-p:ObjCopyName=aarch64-linux-gnu-objcopy'
            }
          }

          dotnet restore src/GnOuGo.Agent.Desktop/GnOuGo.Agent.Desktop.csproj -r $rid @commonProperties

          $publishArgs = @(
            'publish', 'src/GnOuGo.Agent.Desktop/GnOuGo.Agent.Desktop.csproj',
            '-c', 'Release',
            '-r', $rid,
            '--self-contained', 'true',
            '-o', $publishDir,
            '--no-restore'
          ) + $commonProperties

          dotnet @publishArgs

      - name: Validate Bundled Desktop Tools
        shell: pwsh
        run: |
          $publishAot = '${{ inputs.publish_aot }}' -eq 'true'
          $toolExtension = if ('${{ matrix.rid }}' -like 'win-*') { '.exe' } else { '' }
          $desktopExecutable = "artifacts/publish/desktop/${{ matrix.rid }}/GnOuGo.Agent$toolExtension"
          if (-not (Test-Path $desktopExecutable)) {
            throw "Missing desktop executable: $desktopExecutable"
          }

          $desktopManagedDll = "artifacts/publish/desktop/${{ matrix.rid }}/GnOuGo.Agent.dll"
          if ($publishAot -and (Test-Path $desktopManagedDll)) {
            throw "Native AOT desktop publish should not produce a managed entry assembly: $desktopManagedDll"
          }

          $requiredTools = @(
            "artifacts/publish/desktop/${{ matrix.rid }}/tools/GnOuGo.Browser.Mcp/GnOuGo.Browser.Mcp$toolExtension",
            "artifacts/publish/desktop/${{ matrix.rid }}/tools/GnOuGo.Cmd.Mcp/GnOuGo.Cmd.Mcp$toolExtension",
            "artifacts/publish/desktop/${{ matrix.rid }}/tools/GnOuGo.Document.Mcp/GnOuGo.Document.Mcp$toolExtension",
            "artifacts/publish/desktop/${{ matrix.rid }}/tools/GnOuGo.GithubCopilot.Mcp/GnOuGo.GithubCopilot.Mcp$toolExtension",
            "artifacts/publish/desktop/${{ matrix.rid }}/tools/GnOuGo.Git.Mcp/GnOuGo.Git.Mcp$toolExtension"
          )

          foreach ($path in $requiredTools) {
            if (-not (Test-Path $path)) {
              throw "Missing bundled desktop tool: $path"
            }
          }

          $browserToolRoot = "artifacts/publish/desktop/${{ matrix.rid }}/tools/GnOuGo.Browser.Mcp"
          $browserRuntimeConfigPath = Join-Path $browserToolRoot "GnOuGo.Browser.Mcp.runtimeconfig.json"
          $browserDepsJsonPath = Join-Path $browserToolRoot "GnOuGo.Browser.Mcp.deps.json"

          if (-not (Test-Path $browserRuntimeConfigPath)) {
            throw "Bundled Browser tool is expected to remain non-AOT until Microsoft.Playwright is Native AOT compatible: $browserRuntimeConfigPath"
          }

          if (-not (Test-Path $browserDepsJsonPath)) {
            throw "Bundled Browser tool is expected to retain a .deps.json manifest: $browserDepsJsonPath"
          }

          $browserRuntimeConfig = Get-Content $browserRuntimeConfigPath -Raw | ConvertFrom-Json
          $browserInvariantGlobalization = $browserRuntimeConfig.runtimeOptions.configProperties.'System.Globalization.Invariant'
          if ($browserInvariantGlobalization -ne $false) {
            throw "Bundled Browser tool must not use invariant globalization: $browserRuntimeConfigPath"
          }

          $nativeAotTools = $requiredTools | Where-Object { $_ -notlike '*GnOuGo.Browser.Mcp*' }
          foreach ($path in $nativeAotTools) {
            $toolRoot = Split-Path -Parent $path
            $toolName = Split-Path -Leaf $toolRoot
            $runtimeConfigPath = Join-Path $toolRoot "$toolName.runtimeconfig.json"
            $depsJsonPath = Join-Path $toolRoot "$toolName.deps.json"

            if (Test-Path $runtimeConfigPath) {
              throw "Bundled desktop tool must be Native AOT and should not emit a runtimeconfig.json file: $runtimeConfigPath"
            }

            if (Test-Path $depsJsonPath) {
              throw "Bundled desktop tool must be Native AOT and should not emit a .deps.json file: $depsJsonPath"
            }
          }

          Write-Host "Validated bundled desktop tools: Browser stays self-contained non-AOT, all other bundled tools are Native AOT executables."

          $playwrightRoot = Join-Path $browserToolRoot "ms-playwright"
          if (-not (Test-Path $playwrightRoot)) {
            throw "Missing bundled Playwright browsers directory: $playwrightRoot"
          }

          $playwrightDriverRoot = Join-Path $browserToolRoot ".playwright"
          if (-not (Test-Path $playwrightDriverRoot)) {
            throw "Missing bundled Playwright driver directory: $playwrightDriverRoot"
          }

          $nodeExecutableNames = if ('${{ matrix.rid }}' -like 'win-*') { @('node.exe') } else { @('node') }
          $playwrightDriverNodes = Get-ChildItem $playwrightDriverRoot -Recurse -File | Where-Object {
            $_.Name -in $nodeExecutableNames
          }

          if (-not $playwrightDriverNodes) {
            Write-Host "Playwright driver tree under ${playwrightDriverRoot}:"
            Get-ChildItem $playwrightDriverRoot -Recurse | Select-Object -First 200 FullName, Length | Format-Table -AutoSize | Out-String | Write-Host
            throw "Missing bundled Playwright Node driver under: $playwrightDriverRoot"
          }

          $browserFiles = Get-ChildItem $playwrightRoot -Recurse -File
          $browserAppBundles = @()
          $browserExecutables = @()
          if ('${{ matrix.rid }}' -like 'osx-*') {
            $browserExecutables = $browserFiles | Where-Object {
              $normalizedDirectory = $_.DirectoryName -replace '\\', '/'
              $_.Name -in @(
                'Chromium',
                'Chromium Headless Shell',
                'Google Chrome for Testing',
                'chrome',
                'headless_shell'
              ) -or $normalizedDirectory -like '*/Contents/MacOS'
            }

            $browserAppBundles = Get-ChildItem $playwrightRoot -Recurse -Directory -Filter '*.app' | Where-Object {
              $macOsDir = Join-Path $_.FullName 'Contents/MacOS'
              (Test-Path $macOsDir) -and @(Get-ChildItem $macOsDir -File -ErrorAction SilentlyContinue).Count -gt 0
            }
          } else {
            $browserExecutables = $browserFiles | Where-Object {
              $_.Name -in @('chrome.exe', 'chrome', 'headless_shell', 'Chromium')
            }
          }

          if (-not $browserExecutables -and -not $browserAppBundles) {
            Write-Host "Playwright browsers tree under ${playwrightRoot}:"
            Get-ChildItem $playwrightRoot -Recurse | Select-Object -First 200 FullName, Length | Format-Table -AutoSize | Out-String | Write-Host
            throw "Missing bundled Playwright Chromium executable under: $playwrightRoot"
          }

          Write-Host "Found bundled Playwright Chromium executable(s):"
          $browserExecutables | Select-Object -First 20 FullName | Format-Table -AutoSize | Out-String | Write-Host
          $browserAppBundles | Select-Object -First 20 FullName | Format-Table -AutoSize | Out-String | Write-Host
          Write-Host "Found bundled Playwright Node driver(s):"
          $playwrightDriverNodes | Select-Object -First 20 FullName | Format-Table -AutoSize | Out-String | Write-Host

          $requiredUiAssets = @(
            "artifacts/publish/desktop/${{ matrix.rid }}/wwwroot/_framework/blazor.web.js",
            "artifacts/publish/desktop/${{ matrix.rid }}/wwwroot/ui/app.js",
            "artifacts/publish/desktop/${{ matrix.rid }}/wwwroot/ui/app.css"
          )

          foreach ($path in $requiredUiAssets) {
            if (-not (Test-Path $path)) {
              throw "Missing required desktop UI asset: $path"
            }
          }

      - name: Package Desktop Artifact
        shell: pwsh
        run: |
          Get-ChildItem "artifacts/publish/desktop/${{ matrix.rid }}" -Recurse -Filter *.pdb | Remove-Item -Force
          $archive = "${{ matrix.archive }}"
          if (Test-Path $archive) { Remove-Item $archive -Force }

          if ("${{ matrix.rid }}" -like "osx-*") {
            New-Item -ItemType Directory -Path "artifacts/package" -Force | Out-Null
            bash scripts/create-macos-app-bundle.sh "artifacts/publish/desktop/${{ matrix.rid }}" "artifacts/package/gnougo.app"
            tar -czf $archive -C "artifacts/package" "gnougo.app"
          } elseif ("${{ matrix.rid }}" -like "linux-*") {
            $packageRoot = "artifacts/package/gnougo-${{ matrix.rid }}"
            if (Test-Path $packageRoot) { Remove-Item $packageRoot -Recurse -Force }
            New-Item -ItemType Directory -Path $packageRoot -Force | Out-Null
            Copy-Item "artifacts/publish/desktop/${{ matrix.rid }}/*" $packageRoot -Recurse
            Write-Host "Renaming Linux apphost from GnOuGo.Agent to public command name gnougo."
            Move-Item "$packageRoot/GnOuGo.Agent" "$packageRoot/gnougo" -Force
            chmod +x "$packageRoot/gnougo"
            tar -czf $archive -C $packageRoot .

            $packageVersion = "${{ inputs.package_version }}"
            if ([string]::IsNullOrWhiteSpace($packageVersion)) {
              $packageVersion = "${{ github.ref_name }}" -replace '^v', ''
            }
            if ($packageVersion -notmatch '^[0-9][0-9A-Za-z.+:~_-]*$') {
              $packageVersion = "0.0.${{ github.run_number }}"
            }
            $debRoot = "artifacts/package/deb"
            if (Test-Path $debRoot) { Remove-Item $debRoot -Recurse -Force }
            New-Item -ItemType Directory -Path "$debRoot/DEBIAN", "$debRoot/opt/gnougo", "$debRoot/usr/bin" -Force | Out-Null
            Copy-Item "$packageRoot/*" "$debRoot/opt/gnougo" -Recurse
            ln -s "/opt/gnougo/gnougo" "$debRoot/usr/bin/gnougo"
            $installedSize = [Math]::Max(1, [Math]::Ceiling(((Get-ChildItem "$debRoot/opt/gnougo" -Recurse -File | Measure-Object Length -Sum).Sum) / 1KB))
            @(
              "Package: gnougo",
              "Version: $packageVersion",
              "Section: utils",
              "Priority: optional",
              "Architecture: ${{ matrix.deb_arch }}",
              "Maintainer: GnouGo <noreply@github.com>",
              "Installed-Size: $installedSize",
              "Homepage: https://github.com/GnouGo/GnouGo",
              "Description: Friendly Bear Agent desktop application."
            ) | Set-Content -Path "$debRoot/DEBIAN/control" -Encoding ascii
            dpkg-deb --build $debRoot "gnougo_${packageVersion}_${{ matrix.deb_arch }}.deb"
          } else {
            Compress-Archive -Path "artifacts/publish/desktop/${{ matrix.rid }}/*" -DestinationPath $archive
          }

      - name: Upload Desktop Artifact
        uses: actions/upload-artifact@v4
        with:
          name: gnougo-${{ matrix.rid }}
          path: |
            ${{ matrix.archive }}
            gnougo_*.deb
          if-no-files-found: error
