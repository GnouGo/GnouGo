name: Build Agent MCP

on:
  push:
    branches: [ main, master ]
    paths:
      - 'src/GnOuGo.Agent.Mcp/**'
      - 'src/GnOuGo.AI.Core/**'
      - 'src/GnOuGo.Diff.Core/**'
      - 'src/GnOuGo.Observability.Core/**'
      - '.github/workflows/build-agent-mcp-aot.yml'
      - 'global.json'
  pull_request:
    paths:
      - 'src/GnOuGo.Agent.Mcp/**'
      - 'src/GnOuGo.AI.Core/**'
      - 'src/GnOuGo.Diff.Core/**'
      - 'src/GnOuGo.Observability.Core/**'
      - '.github/workflows/build-agent-mcp-aot.yml'
      - 'global.json'
  workflow_dispatch:

jobs:
  publish-win-x64:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Publish Agent MCP (self-contained trimmed) win-x64
        shell: pwsh
        run: |
          dotnet publish src/GnOuGo.Agent.Mcp/GnOuGo.Agent.Mcp.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -o artifacts/agent-mcp-win-x64 `
            -p:PublishTrimmed=true `
            -p:PublishSingleFile=true `
            -p:InvariantGlobalization=false `
            -p:SkipModelMetadataGeneration=true `
            -p:DebugType=None `
            -p:DebugSymbols=false

          $exe = "artifacts/agent-mcp-win-x64/GnOuGo.Agent.Mcp.exe"
          if (-not (Test-Path $exe)) {
            Write-Host "Publish output tree:"
            Get-ChildItem "artifacts/agent-mcp-win-x64" -Recurse | Select-Object FullName, Length | Format-Table -AutoSize | Out-String | Write-Host
            throw "Missing Agent MCP executable: $exe"
          }
