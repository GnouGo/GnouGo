name: Stable Unit Tests

on:
  workflow_call:

permissions:
  contents: read

env:
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"

jobs:
  stable_dotnet_unit_tests:
    name: Stable .NET Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Ensure OTLP proto files
        run: |
          dotnet restore src/GnOuGo.OtlpCollector.Server/GnOuGo.OtlpCollector.Server.csproj /p:SkipClientBuild=true
          dotnet msbuild src/GnOuGo.OtlpCollector.Server/GnOuGo.OtlpCollector.Server.csproj -t:EnsureOtlpProtos /p:SkipClientBuild=true

      - name: Run stable .NET unit tests
        shell: pwsh
        run: |
          dotnet restore /p:SkipClientBuild=true

          $testProjects = Get-ChildItem tests -Filter *.csproj -Recurse |
            Where-Object { $_.FullName -notlike '*GnOuGo.Agent.Server.Tests*' } |
            Sort-Object FullName

          foreach ($project in $testProjects) {
            Write-Host "Running stable test project: $($project.FullName)"
            dotnet test $project.FullName -m:1 --no-restore /p:SkipClientBuild=true
            if ($LASTEXITCODE -ne 0) {
              exit $LASTEXITCODE
            }
          }

  python_unit_tests:
    name: Python Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Run gnougo-flow-core unit tests
        working-directory: librairies/python/gnougo-flow-core
        run: uv run --extra dev pytest -q

      - name: Run gnougo-flow-cli unit tests
        working-directory: librairies/python/gnougo-flow-cli
        run: uv run --extra dev pytest -q
