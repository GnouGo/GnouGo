name: KeyVault MCP Build

on:
  workflow_call:

permissions:
  contents: read

env:
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"

jobs:
  keyvault_mcp:
    name: KeyVault MCP (win-x64)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Publish GnOuGo.KeyVault.Mcp (self-contained trimmed)
        shell: pwsh
        run: |
          dotnet publish "src/GnOuGo.KeyVault.Mcp/GnOuGo.KeyVault.Mcp.csproj" `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishTrimmed=true `
            -p:PublishSingleFile=true
