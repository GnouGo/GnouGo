name: Build (GnOuGo.Agent)

on:
  push:
    branches: [ "main" ]
    tags:
      - "v*.*.*"
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      desktop_publish_aot:
        description: Publish desktop bundled stdio tools with Native AOT (Browser MCP stays managed).
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  packages: write

env:
  DOTNET_NOLOGO: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"

jobs:
  stable_unit_tests:
    name: Stable Unit Tests
    uses: ./.github/workflows/test-stable-unit.yml
    permissions:
      contents: read

  tags:
    name: Compute Version Tag
    needs: [stable_unit_tests]
    if: github.actor != 'dependabot[bot]' && !startsWith(github.ref, 'refs/tags/') && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
    uses: ./.github/workflows/compute-version-tag.yml
    permissions:
      contents: write
    secrets: inherit

  agent_server_tests:
    name: Agent Server Tests (non-blocking)
    uses: ./.github/workflows/test-agent-server.yml
    permissions:
      contents: read

  docker_builds:
    name: Docker Builds
    needs: stable_unit_tests
    uses: ./.github/workflows/build-docker-images.yml
    permissions:
      contents: read
      packages: write
    with:
      push: ${{ github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v') }}
    secrets: inherit

  publish_flow_dotnet_nuget:
    name: Publish Flow .NET packages to NuGet
    needs: [tags]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/publish-flow-dotnet-nuget.yml
    permissions:
      contents: read
    with:
      version: ${{ needs.tags.outputs.new_version }}
    secrets:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

  publish_flow_python_pypi:
    name: Publish gnougo-flow-core to PyPI
    needs: [tags]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    uses: ./.github/workflows/publish-flow-python-pypi.yml
    permissions:
      contents: read
      id-token: write
    with:
      version: ${{ needs.tags.outputs.new_version }}
    secrets:
      PYPI_API_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

  server_linux_x64:
    name: Server (linux-x64)
    uses: ./.github/workflows/build-agent-server-linux-x64.yml
    permissions:
      contents: read

  desktop_trimmed:
    name: Desktop (Trimmed + Native AOT tools)
    needs: [stable_unit_tests, tags]
    if: always() && needs.stable_unit_tests.result == 'success' && (needs.tags.result == 'success' || needs.tags.result == 'skipped')
    uses: ./.github/workflows/build-agent-desktop-trimmed.yml
    permissions:
      contents: read
    with:
      package_version: ${{ needs.tags.outputs.new_version }}
      publish_aot: true

  keyvault_mcp:
    name: KeyVault MCP
    uses: ./.github/workflows/build-keyvault-mcp.yml
    permissions:
      contents: read

  otlp_collector_self_contained:
    name: OTLP Collector
    needs: stable_unit_tests
    uses: ./.github/workflows/build-otlp-collector.yml
    permissions:
      contents: read

  publish_release_main:
    name: Publish Release (${{ needs.tags.outputs.version_tag }})
    needs: [tags, server_linux_x64, desktop_trimmed, otlp_collector_self_contained, docker_builds, publish_flow_dotnet_nuget, publish_flow_python_pypi]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.tags.outputs.is_release == 'true'
    uses: ./.github/workflows/publish-github-release.yml
    permissions:
      actions: read
      contents: write
    with:
      version_tag: ${{ needs.tags.outputs.version_tag }}
      channel_tag: ${{ needs.tags.outputs.tag }}
    secrets:
      WINGET_CREATE_GITHUB_TOKEN: ${{ secrets.WINGET_CREATE_GITHUB_TOKEN }}
      HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
