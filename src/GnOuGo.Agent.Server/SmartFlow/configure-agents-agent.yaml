# Configure Agents — Agent Edition
#
# Commands:
#   /gnougo             — Show agent command documentation
#   /gnougo list        — List all configured agents
#   /gnougo add         — Interactive agent creation flow
#   /gnougo edit <name> — Edit an existing agent
#   /gnougo reprompt <name> — Improve an existing agent workflow from a user prompt
#   /gnougo remove <name> — Remove an agent
#   /gnougo select <name> — Set as current chat agent

version: 1
name: configure-agents-agent
meta:
  author: GnOuGo.Agent
  description: >
    Interactive agent management wizard triggered by /gnougo slash-commands.
    Agents are stored as YAML files in the GnOuGo workspace with workflow YAML
    and original prompts.

workflows:
  main:
    inputs:
      command:
        type: string
        required: false
        default: ""
        description: >
          Full slash-command, e.g. /gnougo, /gnougo list, /gnougo add, /gnougo select mybot.

    steps:
      - id: parse_cmd
        type: set
        input:
          raw: "${trim(data.inputs.command ?? '')}"
          lower: "${lower(trim(data.inputs.command ?? ''))}"

      - id: parsed
        type: set
        input:
          remainder: "${length(data.steps.parse_cmd.lower) > 7 ? trim(substring(data.steps.parse_cmd.lower, 7)) : ''}"
          # Keep original case for the argument (agent names are case-sensitive)
          remainder_original: "${length(data.steps.parse_cmd.raw) > 7 ? trim(substring(data.steps.parse_cmd.raw, 7)) : ''}"

      - id: action_parts
        type: set
        input:
          action: "${data.steps.parsed.remainder == '' ? 'help' : startsWith(data.steps.parsed.remainder, 'list') ? 'list' : startsWith(data.steps.parsed.remainder, 'add') ? 'add' : startsWith(data.steps.parsed.remainder, 'edit') ? 'edit' : startsWith(data.steps.parsed.remainder, 'reprompt') ? 'reprompt' : startsWith(data.steps.parsed.remainder, 'remove') ? 'remove' : startsWith(data.steps.parsed.remainder, 'select') ? 'select' : 'help'}"
          argument: "${startsWith(data.steps.parsed.remainder, 'edit ') ? trim(substring(data.steps.parsed.remainder_original, 5)) : startsWith(data.steps.parsed.remainder, 'reprompt ') ? trim(substring(data.steps.parsed.remainder_original, 9)) : startsWith(data.steps.parsed.remainder, 'remove ') ? trim(substring(data.steps.parsed.remainder_original, 7)) : startsWith(data.steps.parsed.remainder, 'select ') ? trim(substring(data.steps.parsed.remainder_original, 7)) : ''}"

      - id: debug_parsed
        type: emit
        input:
          message: "🔍 Agent command — Action: ${data.steps.action_parts.action} | Arg: ${data.steps.action_parts.argument}"
          level: thinking

      - id: route
        type: switch
        expr: "${data.steps.action_parts.action}"
        cases:
          - value: "list"
            steps:
              - id: agent_list
                type: workflow.call
                input:
                  ref: { kind: local, name: agent_list }
                  args: {}

          - value: "add"
            steps:
              - id: agent_add
                type: workflow.call
                input:
                  ref: { kind: local, name: agent_add }
                  args: {}

          - value: "edit"
            steps:
              - id: agent_edit
                type: workflow.call
                input:
                  ref: { kind: local, name: agent_edit }
                  args:
                    name: "${data.steps.action_parts.argument}"

          - value: "reprompt"
            steps:
              - id: agent_reprompt
                type: workflow.call
                input:
                  ref: { kind: local, name: agent_reprompt }
                  args:
                    name: "${data.steps.action_parts.argument}"

          - value: "remove"
            steps:
              - id: agent_remove
                type: workflow.call
                input:
                  ref: { kind: local, name: agent_remove }
                  args:
                    name: "${data.steps.action_parts.argument}"

          - value: "select"
            steps:
              - id: agent_select
                type: workflow.call
                input:
                  ref: { kind: local, name: agent_select }
                  args:
                    name: "${data.steps.action_parts.argument}"

        default:
          - id: agent_help
            type: template.render
            input:
              engine: mustache
              template: |
                # 🤖 Agent Commands

                | Command                 | Description                                    |
                |-------------------------|------------------------------------------------|
                | `/gnougo list`           | List all configured agents                     |
                | `/gnougo add`            | Create a new agent (interactive wizard)        |
                | `/gnougo edit <name>`    | Edit an existing agent                         |
                | `/gnougo reprompt <name>`| Improve an existing agent workflow by prompt   |
                | `/gnougo remove <name>`  | Remove an agent                                |
                | `/gnougo select <name>`  | Set as current agent for this chat             |

                **Creating an agent:**
                - Requires a configured default LLM provider (`/llm add`, then `/llm default`)
                1. Choose a name for the agent
                2. Describe what the agent should do (natural language prompt)
                3. A workflow YAML is generated from your description
                4. The agent is saved with all metadata

                The selected agent name is displayed at the top of the chat.
                The text input supports YAML directly.
              data: {}
              mode: text
          - id: emit_agent_help
            type: emit
            input:
              message: "${data.steps.agent_help.text}"
              level: response

    outputs:
      agent_selected:
        expr: "${data.steps.agent_select?.outputs?.agent_name ?? data.steps.agent_add?.outputs?.agent_name ?? null}"
        type: string
        description: "Name of the selected agent after /gnougo add or /gnougo select"

  # ══════════════════════════════════════════════════════════════════
  # /gnougo list
  # ══════════════════════════════════════════════════════════════════
  agent_list:
    inputs: {}
    steps:
      - id: think_loading
        type: emit
        input:
          message: "📋 Loading agents…"
          level: thinking

      - id: list_agents
        type: mcp.call
        input:
          server: GnOuGo.Agent.Mcp
          method: agent_list

      - id: format_list
        type: llm.call
        input:
          temperature: 0.2
          prompt: >
            You are a formatter. Given the following agent list data, produce a clean Markdown table.

            Agent data:
            ${json(data.steps.list_agents)}

            Format:
            # 🤖 Configured Agents

            | Name | ID | Created | Updated |
            |------|----|---------|---------|

            For each agent, show the name, a short ID (first 8 chars), and formatted dates.
            If no agents found, say "No agents configured yet. Use `/gnougo add` to create one."

      - id: emit_list
        type: emit
        input:
          message: "${data.steps.format_list.text}"
          level: response

    outputs: {}

  # ══════════════════════════════════════════════════════════════════
  # /gnougo add — Interactive agent creation with workflow generation
  # ══════════════════════════════════════════════════════════════════
  agent_add:
    inputs: {}

    steps:
      - id: think_start
        type: emit
        input:
          message: "🤖 Starting agent creation wizard…"
          level: thinking

      # Step 1: Agent name
      - id: input_name
        type: human.input
        input:
          mode: form
          prompt: "Choose a name for this agent:"
          fields:
            - name: agent_name
              type: string
              required: true
              description: "Agent name (e.g. code-reviewer, daily-reporter)"
          timeout_ms: 36000000

      - id: normalized_name
        type: set
        input:
          agent_name: "${trim(data.steps.input_name.agent_name)}"

      - id: check_name_available
        type: mcp.call
        input:
          server: GnOuGo.Agent.Mcp
          method: agent_get_by_name
          raise_on_error: false
          request:
            name: "${data.steps.normalized_name.agent_name}"

      - id: check_name_available_branch
        type: switch
        cases:
          - when: "${data.steps.normalized_name.agent_name == ''}"
            steps:
              - id: emit_invalid_name
                type: emit
                input:
                  message: "❌ Agent name cannot be empty. Please retry `/gnougo add` with a non-empty name."
                  level: response
              - id: invalid_name_result
                type: set
                input:
                  agent_name: ""

          - when: "${data.steps.check_name_available.response.success == true}"
            steps:
              - id: emit_duplicate_name
                type: emit
                input:
                  message: "❌ Agent '${data.steps.check_name_available.response.agent.name}' already exists. Use `/gnougo edit ${data.steps.check_name_available.response.agent.name}` to update it or choose another name."
                  level: response
              - id: duplicate_name_result
                type: set
                input:
                  agent_name: ""

          - when: "${data.steps.check_name_available.response.success != true && data.steps.check_name_available.response.error_code != 'NOT_FOUND'}"
            steps:
              - id: emit_name_check_failed
                type: emit
                input:
                  message: "❌ Could not verify whether agent name '${data.steps.normalized_name.agent_name}' is available. ${data.steps.check_name_available.response.error_message ?? 'Unknown error.'}"
                  level: response
              - id: name_check_failed_result
                type: set
                input:
                  agent_name: ""

        default:
          # Step 2: Describe the agent purpose
          - id: input_prompt
            type: human.input
            input:
              mode: form
              prompt: "Describe what this agent should do (natural language):"
              fields:
                - name: description
                  type: string
                  required: true
                  description: "Describe the agent's purpose and behavior. This prompt will be used to generate a workflow YAML."
              timeout_ms: 36000000

          - id: think_generating
            type: emit
            input:
              message: "⚙️ Generating workflow YAML from your description using ${data.inputs.agent_llm_provider}/${data.inputs.agent_llm_model}…"
              level: thinking


          # Step 3: Generate and validate workflow YAML from the description
          - id: generate_workflow
            type: workflow.plan
            input:
              generator:
                prefilter: true
                mode: pipeline
                reasoning: low
                instruction: >
                  Generate a valid GnOuGo.Flow YAML workflow for a persisted chat agent.

                  Agent name: ${data.steps.normalized_name.agent_name}
                  Agent description: ${data.steps.input_prompt.description}

                context: >
                  This YAML will be stored by GnOuGo.Agent.Mcp and later executed by GnOuGo.Agent.Server for each user chat message.
                  The stored agent workflow must be self-contained and should not ask the user to review its own YAML.
                  Prefer direct mcp.call steps with exact server/tool names when the tool names are listed above.
              policy:
                allowed_step_types:
                  - emit
                  - set
                  - template.render
                  - llm.call
                  - mcp.list
                  - mcp.call
                  - sequence
                  - parallel
                  - loop.sequential
                  - loop.parallel
                  - switch
                  - human.input
                  - workflow.call
                denied_step_types:
                  - workflow.plan
                  - workflow.execute
                allow_remote_workflow_refs: false
              limits:
                max_steps_total: 100
              validate:
                compile: true
                dry_run: true
              on_invalid:
                action: reprompt
                max_attempts: 10

          - id: emit_workflow
            type: emit
            input:
              message: "📝 Generated workflow:\n\n```yaml\n${data.steps.generate_workflow.yaml}\n```"
              level: thinking

          # Step 4: Review workflow
          - id: review_workflow
            type: human.input
            input:
              mode: choice
              prompt: "Review the generated workflow. You can approve it or modify it by pasting corrected YAML."
              context: "${data.steps.generate_workflow.yaml}"
              choices:
                - approve
                - modify
              timeout_ms: 36000000

          - id: workflow_branch
            type: switch
            cases:
              - when: "${data.steps.review_workflow.response == 'modify'}"
                steps:
                  - id: custom_workflow
                    type: human.input
                    input:
                      mode: form
                      prompt: "Paste your modified workflow YAML below:"
                      fields:
                        - name: yaml
                          type: yaml
                          required: true
                          description: "Modified workflow YAML"
                          default: "${data.steps.generate_workflow.yaml}"
                      timeout_ms: 36000000
                  - id: final_workflow_modified
                    type: set
                    input:
                      workflow: "${data.steps.custom_workflow.yaml}"

            default:
              - id: final_workflow_approved
                type: set
                input:
                  workflow: "${data.steps.generate_workflow.yaml}"

          - id: final_workflow
            type: set
            input:
              workflow: "${data.steps.final_workflow_modified?.workflow ?? data.steps.final_workflow_approved?.workflow ?? data.steps.generate_workflow.yaml}"

          # Step 5: Save agent via MCP
          - id: think_saving
            type: emit
            input:
              message: "💾 Saving agent '${data.steps.normalized_name.agent_name}'…"
              level: progress

          - id: save_agent
            type: mcp.call
            input:
              server: GnOuGo.Agent.Mcp
              method: agent_add
              raise_on_error: false
              request:
                name: "${data.steps.normalized_name.agent_name}"
                workflow: "${data.steps.final_workflow.workflow}"
                originalPrompt: "${data.steps.input_prompt.description}"

          - id: save_agent_branch
            type: switch
            cases:
              - when: "${data.steps.save_agent.response.success != true}"
                steps:
                  - id: emit_save_failed
                    type: emit
                    input:
                      message: "❌ Failed to create agent '${data.steps.normalized_name.agent_name}'. ${data.steps.save_agent.response.error_message ?? 'Unknown error.'}"
                      level: response

            default:
              - id: emit_saved
                type: emit
                input:
                  message: "✅ Agent '${data.steps.normalized_name.agent_name}' created successfully and is now the active agent for this chat."
                  level: response

    outputs:
      agent_name:
        expr: "${data.steps.save_agent?.response?.success == true ? data.steps.normalized_name.agent_name : data.steps.invalid_name_result?.agent_name ?? data.steps.duplicate_name_result?.agent_name ?? data.steps.name_check_failed_result?.agent_name ?? ''}"
        type: string
        description: "Name of the newly created agent when creation succeeds"

  # ══════════════════════════════════════════════════════════════════
  # /gnougo edit <name>
  # ══════════════════════════════════════════════════════════════════
  agent_edit:
    inputs:
      name:
        type: string
        required: true

    steps:
      - id: think_loading
        type: emit
        input:
          message: "🔍 Loading agent '${data.inputs.name}'…"
          level: thinking

      - id: find_agent
        type: mcp.call
        input:
          server: GnOuGo.Agent.Mcp
          method: agent_get_by_name
          raise_on_error: false
          request:
            name: "${data.inputs.name}"

      - id: check_found
        type: switch
        cases:
          - when: "${data.steps.find_agent.response.success != true}"
            steps:
              - id: not_found
                type: emit
                input:
                  message: "❌ Agent '${data.inputs.name}' not found. Use `/gnougo list` to see available agents."
                  level: response

        default:
          - id: show_current
            type: emit
            input:
              message: "📝 Current workflow for '${data.steps.find_agent.response.agent.name}':\n\n```yaml\n${data.steps.find_agent.response.agent.workflow}\n```"
              level: thinking

          - id: edit_name
            type: human.input
            input:
              mode: form
              prompt: "Update the agent name if needed, or keep the current value:"
              fields:
                - name: agent_name
                  type: string
                  required: true
                  description: "Agent name"
                  default: "${data.steps.find_agent.response.agent.name}"
              timeout_ms: 36000000

          - id: normalized_edit_name
            type: set
            input:
              original_name: "${trim(data.steps.find_agent.response.agent.name)}"
              agent_name: "${trim(data.steps.edit_name.agent_name ?? data.steps.find_agent.response.agent.name)}"
              name_changed: "${lower(trim(data.steps.edit_name.agent_name ?? data.steps.find_agent.response.agent.name)) != lower(trim(data.steps.find_agent.response.agent.name))}"

          - id: check_edited_name_available
            type: mcp.call
            input:
              server: GnOuGo.Agent.Mcp
              method: agent_get_by_name
              raise_on_error: false
              request:
                name: "${data.steps.normalized_edit_name.agent_name}"

          - id: check_edited_name_available_branch
            type: switch
            cases:
              - when: "${data.steps.normalized_edit_name.agent_name == ''}"
                steps:
                  - id: emit_invalid_edit_name
                    type: emit
                    input:
                      message: "❌ Agent name cannot be empty. Please retry `/gnougo edit ${data.inputs.name}` with a non-empty name."
                      level: response

              - when: "${data.steps.normalized_edit_name.name_changed == true && data.steps.check_edited_name_available.response.success == true}"
                steps:
                  - id: emit_duplicate_edit_name
                    type: emit
                    input:
                      message: "❌ Agent '${data.steps.check_edited_name_available.response.agent.name}' already exists. Use `/gnougo edit ${data.steps.check_edited_name_available.response.agent.name}` to update it or choose another name."
                      level: response

              - when: "${data.steps.normalized_edit_name.name_changed == true && data.steps.check_edited_name_available.response.success != true && data.steps.check_edited_name_available.response.error_code != 'NOT_FOUND'}"
                steps:
                  - id: emit_edit_name_check_failed
                    type: emit
                    input:
                      message: "❌ Could not verify whether agent name '${data.steps.normalized_edit_name.agent_name}' is available. ${data.steps.check_edited_name_available.response.error_message ?? 'Unknown error.'}"
                      level: response

            default:
              - id: edit_workflow
                type: human.input
                input:
                  mode: form
                  prompt: "Enter the new workflow YAML (or modify the existing one):"
                  fields:
                    - name: yaml
                      type: yaml
                      required: true
                      description: "Workflow YAML"
                      default: "${data.steps.find_agent.response.agent.workflow}"
                  timeout_ms: 36000000

              - id: new_workflow
                type: set
                input:
                  workflow: "${data.steps.edit_workflow.yaml}"

              - id: final_edit_workflow
                type: set
                input:
                  workflow: "${data.steps.new_workflow?.workflow ?? data.steps.find_agent.response.agent.workflow}"

              - id: confirm_edit
                type: human.input
                input:
                  mode: choice
                  prompt: "Save the updated agent '${data.steps.normalized_edit_name.agent_name}'?"
                  choices:
                    - save
                    - discard
                  timeout_ms: 36000000

              - id: save_edit_branch
                type: switch
                cases:
                  - when: "${data.steps.confirm_edit.response == 'save'}"
                    steps:
                      - id: save_update
                        type: mcp.call
                        input:
                          server: GnOuGo.Agent.Mcp
                          method: agent_update
                          raise_on_error: false
                          request:
                            id: "${data.steps.find_agent.response.agent.id}"
                            name: "${data.steps.normalized_edit_name.agent_name}"
                            workflow: "${data.steps.final_edit_workflow.workflow}"

                      - id: save_update_result
                        type: switch
                        cases:
                          - when: "${data.steps.save_update.response.success != true}"
                            steps:
                              - id: emit_update_failed
                                type: emit
                                input:
                                  message: "❌ Failed to update agent '${data.steps.normalized_edit_name.agent_name}'. ${data.steps.save_update.response.error_message ?? 'Unknown error.'}"
                                  level: response

                        default:
                          - id: emit_updated
                            type: emit
                            input:
                              message: "✅ Agent '${data.steps.normalized_edit_name.agent_name}' updated."
                              level: response

                default:
                  - id: emit_edit_discarded
                    type: emit
                    input:
                      message: "❌ Edit discarded."
                      level: thinking

    outputs: {}

  # ══════════════════════════════════════════════════════════════════
  # /gnougo reprompt <name>
  # ══════════════════════════════════════════════════════════════════
  agent_reprompt:
    inputs:
      name:
        type: string
        required: true

    steps:
      - id: think_loading
        type: emit
        input:
          message: "🔍 Loading workflow '${data.inputs.name}'…"
          level: thinking

      - id: find_agent
        type: mcp.call
        input:
          server: GnOuGo.Agent.Mcp
          method: agent_get_by_name
          raise_on_error: false
          request:
            name: "${data.inputs.name}"

      - id: check_found
        type: switch
        cases:
          - when: "${data.steps.find_agent.response.success != true}"
            steps:
              - id: not_found
                type: emit
                input:
                  message: "❌ Agent '${data.inputs.name}' not found. Use `/gnougo list` to see available agents."
                  level: response

        default:
          - id: show_current
            type: emit
            input:
              message: "📝 Current workflow for '${data.steps.find_agent.response.agent.name}':\n\n```yaml\n${data.steps.find_agent.response.agent.workflow}\n```"
              level: response

          - id: reprompt_improvement
            type: human.input
            input:
              mode: form
              prompt: "Describe how GnOuGo should improve this workflow:"
              context: "${data.steps.find_agent.response.agent.workflow}"
              fields:
                - name: prompt
                  type: string
                  required: true
                  description: "Improvement prompt, for example: add error handling, change MCP tool arguments, or return a richer answer."
              timeout_ms: 36000000

          - id: normalized_reprompt
            type: set
            input:
              prompt: "${trim(data.steps.reprompt_improvement.prompt ?? '')}"

          - id: reprompt_branch
            type: switch
            cases:
              - when: "${data.steps.normalized_reprompt.prompt == ''}"
                steps:
                  - id: emit_empty_reprompt
                    type: emit
                    input:
                      message: "❌ Improvement prompt cannot be empty. Please retry `/gnougo reprompt ${data.steps.find_agent.response.agent.name}` with a concrete request."
                      level: response

            default:
              - id: think_reprompting
                type: emit
                input:
                  message: "⚙️ Improving workflow '${data.steps.find_agent.response.agent.name}' from your prompt…"
                  level: thinking

              - id: plan_reprompt
                type: workflow.plan
                input:
                  generator:
                    prefilter: true
                    reasoning: medium
                    instruction: |
                      Repair and improve an existing persisted GnOuGo.Flow chat-agent workflow.
                      Return only a complete workflow YAML document, no markdown fences.

                      Keep the same agent identity unless the user explicitly asks otherwise:
                      - agent name: ${data.steps.find_agent.response.agent.name}
                      - persisted agent id: ${data.steps.find_agent.response.agent.id}

                      Preserve the chat-agent contract:
                      - The workflow must be executable by GnOuGo.Agent.Server for a user chat message.
                      - It must accept a user task/prompt input such as `task`.
                      - It must expose an `answer` output string.
                      - It must remain self-contained and must not ask the user to review its own YAML.

                      Apply this user improvement request:
                      <user_reprompt>
                      ${data.steps.normalized_reprompt.prompt}
                      </user_reprompt>

                      Existing original agent prompt:
                      <original_agent_prompt>
                      ${data.steps.find_agent.response.agent.original_prompt ?? ''}
                      </original_agent_prompt>

                      Current workflow YAML:
                      <current_workflow_yaml>
                      ${data.steps.find_agent.response.agent.workflow}
                      </current_workflow_yaml>
                    context: |
                      This is a manual `/gnougo reprompt` operation.
                      Treat the current workflow as the previous version and produce the corrected replacement.
                      Keep changes focused on the user's improvement prompt.
                      The replacement YAML will be persisted through GnOuGo.Agent.Mcp `agent_update`.
                      Keep the generated workflow compatible with the available DSL and MCP tool contracts.
                  policy:
                    allowed_step_types:
                      - emit
                      - set
                      - template.render
                      - llm.call
                      - mcp.list
                      - mcp.call
                      - sequence
                      - parallel
                      - loop.sequential
                      - loop.parallel
                      - switch
                      - human.input
                      - workflow.call
                    denied_step_types:
                      - workflow.plan
                      - workflow.execute
                    allow_remote_workflow_refs: false
                  limits:
                    max_steps_total: 100
                  validate:
                    compile: true
                    dry_run: true
                  on_invalid:
                    action: reprompt
                    max_attempts: 3

              - id: emit_reprompted_workflow
                type: emit
                input:
                  message: "📝 Proposed improved workflow:\n\n```yaml\n${data.steps.plan_reprompt.yaml}\n```"
                  level: response

              - id: review_reprompt_workflow
                type: human.input
                input:
                  mode: choice
                  prompt: "Save this improved workflow for '${data.steps.find_agent.response.agent.name}'?"
                  context: "${data.steps.plan_reprompt.yaml}"
                  choices:
                    - save
                    - discard
                  timeout_ms: 36000000

              - id: save_reprompt_branch
                type: switch
                cases:
                  - when: "${data.steps.review_reprompt_workflow.response == 'save'}"
                    steps:
                      - id: save_reprompted_agent
                        type: mcp.call
                        input:
                          server: GnOuGo.Agent.Mcp
                          method: agent_update
                          raise_on_error: false
                          request:
                            id: "${data.steps.find_agent.response.agent.id}"
                            name: "${data.steps.find_agent.response.agent.name}"
                            workflow: "${data.steps.plan_reprompt.yaml}"
                            originalPrompt: "${data.steps.find_agent.response.agent.original_prompt ?? ''}"

                      - id: save_reprompt_result
                        type: switch
                        cases:
                          - when: "${data.steps.save_reprompted_agent.response.success != true}"
                            steps:
                              - id: emit_reprompt_save_failed
                                type: emit
                                input:
                                  message: "❌ Failed to update workflow '${data.steps.find_agent.response.agent.name}'. ${data.steps.save_reprompted_agent.response.error_message ?? 'Unknown error.'}"
                                  level: response

                        default:
                          - id: emit_reprompt_saved
                            type: emit
                            input:
                              message: "✅ Workflow '${data.steps.find_agent.response.agent.name}' improved and saved."
                              level: response

                default:
                  - id: emit_reprompt_discarded
                    type: emit
                    input:
                      message: "❌ Workflow improvement discarded."
                      level: response

    outputs: {}

  # ══════════════════════════════════════════════════════════════════
  # /gnougo remove <name>
  # ══════════════════════════════════════════════════════════════════
  agent_remove:
    inputs:
      name:
        type: string
        required: true

    steps:
      - id: find_agent
        type: mcp.call
        input:
          server: GnOuGo.Agent.Mcp
          method: agent_get_by_name
          raise_on_error: false
          request:
            name: "${data.inputs.name}"

      - id: check_found
        type: switch
        cases:
          - when: "${data.steps.find_agent.response.success != true}"
            steps:
              - id: not_found
                type: emit
                input:
                  message: "❌ Agent '${data.inputs.name}' not found."
                  level: response

        default:
          - id: confirm_remove
            type: human.input
            input:
              mode: choice
              prompt: "⚠️ Are you sure you want to remove agent '${data.inputs.name}'?"
              choices:
                - confirm
                - cancel
              timeout_ms: 36000000

          - id: remove_branch
            type: switch
            cases:
              - when: "${data.steps.confirm_remove.response == 'confirm'}"
                steps:
                  - id: delete_agent
                    type: mcp.call
                    input:
                      server: GnOuGo.Agent.Mcp
                      method: agent_delete
                      raise_on_error: false
                      request:
                        id: "${data.steps.find_agent.response.agent.id}"

                  - id: delete_agent_result
                    type: switch
                    cases:
                      - when: "${data.steps.delete_agent.response.success != true}"
                        steps:
                          - id: emit_remove_failed
                            type: emit
                            input:
                              message: "❌ Failed to remove agent '${data.inputs.name}'. ${data.steps.delete_agent.response.error_message ?? 'Unknown error.'}"
                              level: response

                    default:
                      - id: emit_removed
                        type: emit
                        input:
                          message: "✅ Agent '${data.inputs.name}' removed."
                          level: response

            default:
              - id: emit_cancelled
                type: emit
                input:
                  message: "❌ Removal cancelled."
                  level: thinking

    outputs: {}

  # ══════════════════════════════════════════════════════════════════
  # /gnougo select <name> — Set as current chat agent
  # ══════════════════════════════════════════════════════════════════
  agent_select:
    inputs:
      name:
        type: string
        required: true

    steps:
      - id: find_agent
        type: mcp.call
        input:
          server: GnOuGo.Agent.Mcp
          method: agent_get_by_name
          raise_on_error: false
          request:
            name: "${data.inputs.name}"

      - id: check_found
        type: switch
        cases:
          - when: "${data.steps.find_agent.response.success != true}"
            steps:
              - id: not_found
                type: emit
                input:
                  message: "❌ Agent '${data.inputs.name}' not found. Use `/gnougo list` to see available agents."
                  level: response
              - id: not_found_result
                type: set
                input:
                  agent_name: ""

        default:
          - id: emit_selected
            type: emit
            input:
              message: "✅ Agent '${data.steps.find_agent.response.agent.name}' is now the active agent for this chat."
              level: response
          - id: selected_result
            type: set
            input:
              agent_name: "${data.steps.find_agent.response.agent.name}"

    outputs:
      agent_name:
        expr: "${data.steps.selected_result?.agent_name ?? data.steps.not_found_result?.agent_name ?? ''}"
        type: string
        description: "Selected agent name (empty if not found)"
