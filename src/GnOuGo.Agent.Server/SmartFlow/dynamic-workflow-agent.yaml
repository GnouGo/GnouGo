version: 1
name: dynamic-workflow-agent
meta:
  description: >
    Demo showcasing the workflow.plan + workflow.execute capabilities with
    direct dynamic workflow generation.
    
    This agent takes a user task description in natural language, generates a
    GnOuGo.Flow workflow on-the-fly, validates it against a strict policy, then
    executes the generated workflow and returns the result.
    
    This demonstrates:
      - Dynamic workflow generation via LLM (workflow.plan)
      - Policy enforcement (allowed step types, max steps)
      - Automatic re-prompting on validation errors (up to 3 attempts)
      - Execution of the generated workflow (workflow.execute)
      - Optional human-approved Markdown export through `GnOuGo.Cmd.Mcp`
      - Combining static and dynamic workflows in one document
    
    Requires:
      - A default LLM provider/model configured at runtime
      - Optional for file export: `GnOuGo.Cmd.Mcp` configured with `write_markdown_file`
    
    Usage:
      gnougo-flow run examples/dynamic-workflow-agent.yaml -i task="Write a haiku about Kubernetes, then translate it to French"
      gnougo-flow run examples/dynamic-workflow-agent.yaml -i task="Generate 3 creative product names for a coffee shop and pick the best one"
      gnougo-flow run examples/dynamic-workflow-agent.yaml -i task="Summarize the pros and cons of microservices vs monoliths"

workflows:
  main:
    inputs:
      task:
        type: string
        required: true
        description: A natural-language description of the task to accomplish
      markdown_timestamp_format:
        type: string
        required: false
        default: dd_MM_yyyy
        description: .NET date/time pattern used in the default Markdown export filename, for example dd_MM_yyyy or dd_MM_yyyy_HH_mm_ss
    
    steps:
      # ──────────────────────────────────────────────────────────
      # Phase 1: Signal planning start
      # ──────────────────────────────────────────────────────────
      - id: think_plan
        type: emit
        input:
          message: "Planning a workflow for: ${data.inputs.task}"
          level: thinking

      # ──────────────────────────────────────────────────────────
      # Phase 2: Ask the LLM to generate a workflow dynamically
      # ──────────────────────────────────────────────────────────
      - id: generate
        type: workflow.plan
        input:
          generator:
            instruction: >
              Create a workflow that accomplishes the following task:
              ${coalesce(data.inputs.task, "no task provided")}

              Keep the generated workflow as short as possible and aim for fewer than 10 steps when feasible.
              
              The workflow MUST be named "generated" and have a single workflow
              with an "answer" output containing the final result as a string.
              Use multiple steps if the task naturally decomposes into sub-tasks.
              
              IMPORTANT RULES:
              - For llm.call: "prompt" is REQUIRED under "input:".
                Do NOT use "messages". Use "prompt" as a plain string.
              - Omit provider/model on llm.call when runtime defaults should apply.
                Specify them only when a step must override the defaults.
              - For template.render: "engine", "template", and "mode" are required.
              - For browser_get_content on search/e-commerce pages such as Amazon, prefer waitUntil="domcontentloaded" or "load"; do not use "networkidle" unless the page is known to become idle.
              - Generated llm.call steps should normally reuse runtime defaults and use temperature 0.7 unless a specific override is necessary.
              - Outputs MUST reference step results via the pattern data.steps.STEP_ID.text
              - llm.call output has field "text", template.render output has field "text"
              - The workflow outputs section must define "answer" referencing the final step text output.
            context: >
              The user wants a fully automated workflow. Generated llm.call steps should
              reuse runtime LLM defaults when possible and use temperature 0.7 by default.
              The final output must be a field called "answer" with the complete result.
          
          policy:
            allowed_step_types:
            denied_step_types:
            allow_remote_workflow_refs: false
          
          limits:
            max_steps_total: 20
          
          validate:
            compile: true
          
          on_invalid:
            action: reprompt
            max_attempts: 3
      
      # ──────────────────────────────────────────────────────────
      # Phase 3: Log what was generated (for observability)
      # ──────────────────────────────────────────────────────────
      - id: log_plan
        type: template.render
        input:
          engine: mustache
          mode: text
          template: |
            === Generated Workflow ===
            Name: {{name}}
            Workflows: {{workflows}}
            Attempt: {{attempt}}
            ===========================
          data:
            name: "${data.steps.generate.workflow.name}"
            workflows: "${json(data.steps.generate.workflow.workflows)}"
            attempt: "${data.steps.generate.meta.attempt}"
      
      # ──────────────────────────────────────────────────────────
      # Phase 4: Execute the generated workflow
      # ──────────────────────────────────────────────────────────
      - id: think_exec
        type: emit
        input:
          message: "Executing generated workflow (attempt ${data.steps.generate.meta.attempt})…"
          level: progress

      - id: run
        type: workflow.execute
        input:
          from_step: generate
      
      # ──────────────────────────────────────────────────────────
      # Phase 5: Format the final response
      # ──────────────────────────────────────────────────────────
      - id: think_format
        type: emit
        input:
          message: "Formatting final response…"
          level: thinking

      - id: format
        type: llm.call
        input:
          temperature: 0.3
          prompt: >
            The user asked: "${data.inputs.task}"
            
            A dynamically generated workflow produced the following result:
            ${json(data.steps.run.outputs)}
            
            Please format this into a clean, well-structured response for the user.
            Use markdown formatting. Be concise but complete.
            Start directly with the answer, do not mention that a workflow was used.

      # ──────────────────────────────────────────────────────────
      # Phase 6: Optional human-approved Markdown export
      # ──────────────────────────────────────────────────────────
      - id: ask_markdown_export
        type: human.input
        input:
          mode: choice
          prompt: |
            The final answer is ready.
            Do you want to save it as a Markdown file?
          context: "${data.steps.format.text}"
          choices:
            - save
            - skip

      - id: ask_markdown_path
        type: human.input
        if: "${data.steps.ask_markdown_export.response == 'save'}"
        input:
          mode: form
          prompt: "Enter the relative .md path to create inside the GnOuGo workspace:"
          fields:
            - name: file_path
              type: string
              required: true
              default: "${'exports/final-answer-' + formatDate(now(), data.inputs.markdown_timestamp_format) + '.md'}"
              description: Relative Markdown file path. The default includes the current date, and you can use formats such as dd_MM_yyyy or dd_MM_yyyy_HH_mm_ss.

      - id: render_markdown_export
        type: template.render
        if: "${data.steps.ask_markdown_export.response == 'save'}"
        input:
          engine: mustache
          mode: text
          template: |
            # Final Answer

            **Task**

            {{task}}

            ---

            {{{answer}}}
          data:
            task: "${data.inputs.task}"
            answer: "${data.steps.format.text}"

      - id: save_markdown_file
        type: mcp.call
        if: "${data.steps.ask_markdown_export.response == 'save'}"
        input:
          server: GnOuGo.Cmd.Mcp
          method: cmd_run
          request:
            commandName: write_markdown_file
            parametersJson: "${json({ path: data.steps.ask_markdown_path.file_path, contentBase64: base64(data.steps.render_markdown_export.text) })}"
            timeoutMs: 30000
    
    outputs:
      task:
        expr: "${data.inputs.task}"
        type: string
        description: Original user task
      answer:
        expr: "${data.steps.format.text}"
        type: string
        description: Final formatted answer
      generated_yaml:
        expr: "${data.steps.generate.yaml}"
        type: string
        description: Generated YAML workflow source
      markdown_export_requested:
        expr: "${data.steps.ask_markdown_export?.response == 'save'}"
        type: boolean
        description: Whether the user asked to save the final answer as Markdown
      markdown_export_path:
        expr: "${data.steps.ask_markdown_path?.file_path}"
        type: string
        description: Relative Markdown file path requested by the user, if any
      markdown_export_result:
        expr: "${data.steps.save_markdown_file?.response}"
        type: object
        description: Result returned by the MCP command server when saving the Markdown file
      meta:
        model: "${data.steps.generate.meta.model}"
        attempts: "${data.steps.generate.meta.attempt}"
        steps_executed: "${data.steps.run.run.steps_executed}"
        markdown_saved: "${data.steps.ask_markdown_export?.response == 'save'}"
