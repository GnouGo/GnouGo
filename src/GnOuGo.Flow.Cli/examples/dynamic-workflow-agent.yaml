version: 1
name: dynamic-workflow-agent
meta:
  description: >
    Demo showcasing the workflow.plan + workflow.execute capabilities with
    a human-in-the-loop approach analysis phase.
    
    This agent takes a user task description in natural language, first asks an LLM
    to propose the best approach (in Markdown), then presents it to the user for
    approval via a human-in-the-loop review loop. If the user is not satisfied,
    they can provide feedback and the LLM refines the approach. Once approved,
    the agent generates a GnOuGo.Flow workflow on-the-fly, validates it against a
    strict policy, then executes the generated workflow and returns the result.
    
    This demonstrates:
      - LLM-powered approach analysis with human review loop
      - Human-in-the-loop approval / feedback (human.input)
      - Iterative refinement via loop.sequential
      - Dynamic workflow generation via LLM (workflow.plan)
      - Policy enforcement (allowed step types, max steps)
      - Automatic re-prompting on validation errors (up to 3 attempts)
      - Execution of the generated workflow (workflow.execute)
      - Combining static and dynamic workflows in one document
    
    Requires:
      - LLM.Models.OpenAi configured with a valid API key
    
    Usage:
      gnougo-flow run examples/dynamic-workflow-agent.yaml -i task="Write a haiku about Kubernetes, then translate it to French"
      gnougo-flow run examples/dynamic-workflow-agent.yaml -i task="Generate 3 creative product names for a coffee shop and pick the best one"
      gnougo-flow run examples/dynamic-workflow-agent.yaml -i task="Summarize the pros and cons of microservices vs monoliths"

workflows:
  main:
    inputs:
      task:
        type: string
        required: true
        description: A natural-language description of the task to accomplish
    
    steps:
      # ──────────────────────────────────────────────────────────
      # Phase 1: Approach analysis with human-in-the-loop review
      # ──────────────────────────────────────────────────────────
      - id: think_analyze
        type: emit
        input:
          message: "Analyzing the best approach for: ${data.inputs.task}"
          level: thinking

      - id: discover_mcp
        type: mcp.list
        input:
          servers:
            - "*"
          include:
            - tools
            - prompts

      - id: review_loop
        type: loop.sequential
        input:
          while: "${!exists(data.steps.review) || data.steps.review.response != 'approve'}"
          max_times: 10
        steps:
          # LLM analysis — first pass or refinement based on feedback
          - id: analyze
            type: llm.call
            input:
              model: gpt-5.4-mini
              temperature: 0.7
              prompt: >
                ${data._loop.index == 0
                  ? "You are a task analysis expert. Analyze the task and return a very concise **Markdown** execution plan. The plan must be strictly logical, ordered step by step, and easy to execute. Use 3 to 7 short numbered steps, one action per step, with no unnecessary explanation. Prefer available MCP tools/prompts when they reduce work. Mention only the few most relevant tools. End with a very short expected outcome section.\n\nTask: " + data.inputs.task + "\n\n--- Available MCP capabilities ---\n" + data.steps.discover_mcp.text
                  : "You are a task analysis expert. Refine your previous analysis based on the user feedback below. Return an updated very concise **Markdown** execution plan. The plan must stay strictly logical, ordered step by step, and easy to execute. Use 3 to 7 short numbered steps, one action per step, with no unnecessary explanation. Prefer available MCP tools/prompts when they reduce work. Mention only the few most relevant tools. End with a very short expected outcome section.\n\nOriginal task: " + data.inputs.task + "\n\n--- Available MCP capabilities ---\n" + data.steps.discover_mcp.text + "\n\n--- Previous analysis ---\n" + data.steps.analyze.text + "\n\n--- User feedback ---\n" + data.steps.feedback.response + "\n\nProvide an updated approach that addresses the feedback."}

          # Present the analysis and ask the user to approve or request changes
          - id: review
            type: human.input
            input:
              mode: choice
              prompt: |
                Please review the proposed approach below.
                • **Approve** — proceed with automated workflow generation & execution.
                • **Modify** — provide feedback so the approach can be refined.
              context: "${data.steps.analyze.text}"
              choices:
                - approve
                - modify

          # If the user chose "modify", collect their feedback
          - id: feedback
            type: human.input
            if: "${data.steps.review.response == 'modify'}"
            input:
              mode: text
              prompt: "What should be improved or changed in the approach?"

      # ──────────────────────────────────────────────────────────
      # Phase 2: Signal planning start
      # ──────────────────────────────────────────────────────────
      - id: think_plan
        type: emit
        input:
          message: "Approach approved — planning a workflow for: ${data.inputs.task}"
          level: thinking

      # ──────────────────────────────────────────────────────────
      # Phase 3: Ask the LLM to generate a workflow dynamically
      # ──────────────────────────────────────────────────────────
      - id: generate
        type: workflow.plan
        input:
          generator:
            model: gpt-5.4
            instruction: >
              Create a workflow that accomplishes the following task:
              ${coalesce(data.inputs.task, "no task provided")}
              
              An expert has analyzed the task and the user has approved
              the following approach. Follow it closely:
              ${data.steps.analyze.text}

              Available MCP capabilities discovered before planning:
              ${data.steps.discover_mcp.text}

              Keep the generated workflow as short as possible and aim for fewer than 10 steps when feasible.
              Prefer available MCP tools/prompts over additional LLM calls when they are a better fit.
              
              The workflow MUST be named "generated" and have a single workflow
              with an "answer" output containing the final result as a string.
              Use multiple steps if the task naturally decomposes into sub-tasks.
              
              IMPORTANT RULES:
              - For llm.call: "model" and "prompt" are REQUIRED fields under "input:".
                Do NOT use "messages". Use "prompt" as a plain string.
              - For template.render: "engine", "template", and "mode" are required.
              - All llm.call steps must use model "gpt-5.4-mini" with temperature 0.7.
              - Outputs MUST reference step results via the pattern data.steps.STEP_ID.text
              - llm.call output has field "text", template.render output has field "text"
              - The workflow outputs section must define "answer" referencing the final step text output.
            context: >
              The user wants a fully automated workflow. Each LLM call should use
              model "gpt-5.4-mini" with temperature 0.7. The final output must be
              a field called "answer" with the complete result.
          
          policy:
            allowed_step_types:
            denied_step_types:
            allow_remote_workflow_refs: false
          
          limits:
            max_steps_total: 20
          
          validate:
            compile: true
          
          on_invalid:
            action: reprompt
            max_attempts: 3
      
      # ──────────────────────────────────────────────────────────
      # Phase 4: Log what was generated (for observability)
      # ──────────────────────────────────────────────────────────
      - id: log_plan
        type: template.render
        input:
          engine: mustache
          mode: text
          template: |
            === Generated Workflow ===
            Name: {{name}}
            Workflows: {{workflows}}
            Attempt: {{attempt}}
            ===========================
          data:
            name: "${data.steps.generate.workflow.name}"
            workflows: "${json(data.steps.generate.workflow.workflows)}"
            attempt: "${data.steps.generate.meta.attempt}"
      
      # ──────────────────────────────────────────────────────────
      # Phase 5: Execute the generated workflow
      # ──────────────────────────────────────────────────────────
      - id: think_exec
        type: emit
        input:
          message: "Executing generated workflow (attempt ${data.steps.generate.meta.attempt})…"
          level: progress

      - id: run
        type: workflow.execute
        input:
          from_step: generate
      
      # ──────────────────────────────────────────────────────────
      # Phase 6: Format the final response
      # ──────────────────────────────────────────────────────────
      - id: think_format
        type: emit
        input:
          message: "Formatting final response…"
          level: thinking

      - id: format
        type: llm.call
        input:
          model: gpt-5.4
          temperature: 0.3
          prompt: >
            The user asked: "${data.inputs.task}"
            
            A dynamically generated workflow produced the following result:
            ${json(data.steps.run.outputs)}
            
            Please format this into a clean, well-structured response for the user.
            Use rich Markdown formatting (headings, bold, lists, code blocks where relevant).
            Be concise but complete. Start directly with the answer, do not mention that a workflow was used.


    outputs:
      task:
        expr: "${data.inputs.task}"
        type: string
        description: Original user task
      answer:
        expr: "${data.steps.format.text}"
        type: string
        description: Final formatted answer in Markdown
      approved_approach:
        expr: "${data.steps.analyze.text}"
        type: string
        description: The human-approved approach analysis
      review_iterations:
        expr: "${data.steps.review_loop.count}"
        type: number
        description: Number of review iterations before approval
      generated_yaml:
        expr: "${data.steps.generate.yaml}"
        type: string
        description: Generated YAML workflow source
      meta:
        model: "${data.steps.generate.meta.model}"
        attempts: "${data.steps.generate.meta.attempt}"
        steps_executed: "${data.steps.run.run.steps_executed}"
