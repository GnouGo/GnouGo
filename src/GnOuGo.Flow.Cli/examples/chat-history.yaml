version: 1
name: chat-history-demo
meta:
  description: >
    Demonstrates chat history via the GnOuGo.Agent.Mcp MCP stdio server.
    Uses mcp.call to append and retrieve conversation messages.

    Usage:
      gnougo-flow run examples/chat-history.yaml -i user_message="Hello, how are you?"

workflows:
  main:
    inputs:
      user_message:
        type: string
        required: true
        description: The user message to start the conversation

    steps:
      - id: think_start
        type: emit
        input:
          message: "Starting conversation�"
          level: info

      # 1) Start a new conversation by appending the system + user messages
      - id: create_conv
        type: mcp.call
        input:
          server: GnOuGo.Agent.Mcp
          method: user_chat_history_append
          request:
            messagesJson: '[{"role":"system","content":"You are a helpful assistant."},{"role":"user","content":"${data.inputs.user_message}"}]'

      # 2) Call LLM with the user message
      - id: think_llm
        type: emit
        input:
          message: "Generating response�"
          level: thinking

      - id: llm_response
        type: llm.call
        input:
          model: gpt-4
          prompt: "${data.inputs.user_message}"

      # 3) Append the assistant response to the conversation
      - id: save_response
        type: mcp.call
        input:
          server: GnOuGo.Agent.Mcp
          method: user_chat_history_append
          request:
            messagesJson: '[{"role":"assistant","content":"${data.steps.llm_response.text}"}]'
            conversationId: "${data.steps.create_conv.response.conversation_id}"

      # 4) Retrieve the full conversation history
      - id: full_history
        type: mcp.call
        input:
          server: GnOuGo.Agent.Mcp
          method: user_chat_history_get
          request:
            conversationId: "${data.steps.create_conv.response.conversation_id}"
            topK: 100

    outputs:
      conversation_id:
        expr: "${data.steps.create_conv.response.conversation_id}"
        type: string
        description: Unique conversation identifier
      assistant_response:
        expr: "${data.steps.llm_response.text}"
        type: string
        description: LLM assistant response text
      message_count:
        expr: "${len(data.steps.full_history.response.messages)}"
        type: number
        description: Total messages in conversation
