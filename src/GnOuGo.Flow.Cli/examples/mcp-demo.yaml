version: 1
name: mcp-demo
meta:
  description: Demonstrates mcp.call step with tool invocation

workflows:
  main:
    inputs:
      city:
        type: string
        required: true
        default: Paris
        description: City for weather data lookup

    steps:
      - id: think_weather
        type: emit
        input:
          message: "Fetching weather data for ${data.inputs.city}…"
          level: thinking

      # 1) Call an MCP tool to get weather data
      - id: weather
        type: mcp.call
        input:
          server: demo
          method: get_weather
          request:
            location: "${data.inputs.city}"

      # 2) Use LLM to summarize the weather data
      - id: think_summary
        type: emit
        input:
          message: "Summarizing weather data with LLM…"
          level: thinking

      - id: summary
        type: llm.call
        input:
          model: gpt-4
          prompt: "Summarize this weather data: ${json(data.steps.weather.response)}"

    outputs:
      mcp_status:
        expr: "${data.steps.weather.status}"
        type: string
        description: MCP call status
      weather_data:
        expr: "${data.steps.weather.response}"
        type: object
        description: Weather data response
      summary:
        expr: "${data.steps.summary.text}"
        type: string
        description: LLM weather summary
