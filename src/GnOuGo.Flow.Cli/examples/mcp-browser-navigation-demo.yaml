dsl: 1
name: mcp-browser-navigation-demo
meta:
  description: >
    Demonstrates sequential MCP browser navigation with GnOuGo.Flow.Browser.
    Requires Playwright browser binaries to be installed for the GnOuGo.Flow.Browser project.

    Usage from the repository root:
      dotnet run --project src/GnOuGo.Flow.Cli/GnOuGo.Flow.Cli.csproj -- run src/GnOuGo.Flow.Cli/examples/mcp-browser-navigation-demo.yaml

workflows:
  main:
    inputs:
      first_url:
        type: string
        default: https://example.com/
        description: First URL to visit
      second_url:
        type: string
        default: https://www.iana.org/help/example-domains
        description: Second URL to visit
      third_url:
        type: string
        default: https://www.rfc-editor.org/rfc/rfc2606.html
        description: Third URL to visit

    steps:
      - id: discover_browser_tools
        type: mcp.list
        input:
          server: GnOuGo.Flow.Browser
          include:
            - tools

      - id: read_first
        type: mcp.call
        input:
          server: GnOuGo.Flow.Browser
          method: browser_get_content
          request:
            url: "${data.inputs.first_url}"
            waitUntil: domcontentloaded
            format: text
            maxCharacters: 500

      - id: read_second
        type: mcp.call
        input:
          server: GnOuGo.Flow.Browser
          method: browser_get_content
          request:
            url: "${data.inputs.second_url}"
            waitUntil: domcontentloaded
            format: text
            maxCharacters: 500

      - id: read_third
        type: mcp.call
        input:
          server: GnOuGo.Flow.Browser
          method: browser_get_content
          request:
            url: "${data.inputs.third_url}"
            waitUntil: domcontentloaded
            format: text
            maxCharacters: 500

      - id: close_browser
        type: mcp.call
        input:
          server: GnOuGo.Flow.Browser
          method: browser_close

    outputs:
      tool_count:
        expr: "${len(data.steps.discover_browser_tools.tools)}"
        type: number
        description: Number of browser tools discovered
      first_excerpt_status:
        expr: "${data.steps.read_first.status}"
        type: string
        description: First page read status
      first_excerpt:
        expr: "${data.steps.read_first.response}"
        type: object
        description: First page response
      second_excerpt_status:
        expr: "${data.steps.read_second.status}"
        type: string
        description: Second page read status
      second_excerpt:
        expr: "${data.steps.read_second.response}"
        type: object
        description: Second page response
      third_excerpt_status:
        expr: "${data.steps.read_third.status}"
        type: string
        description: Third page read status
      third_excerpt:
        expr: "${data.steps.read_third.response}"
        type: object
        description: Third page response
      close_status:
        expr: "${data.steps.close_browser.status}"
        type: string
        description: Browser close status
      close_result:
        expr: "${data.steps.close_browser.response}"
        type: object
        description: Browser close response
