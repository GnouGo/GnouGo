# Configure LLM Providers & MCP Servers — Slash-Command Wizard
#
# Single input: type a slash-command to enter a configuration flow.
# If left empty, the workflow lists all available commands.
#
# Commands:
#   /llm      — Configure an LLM provider (OpenAI, Ollama, Copilot)
#   /mcp      — Configure an MCP server (HTTP or stdio)
#   /status   — Display current configuration summary
#   (empty)   — Show this help
#
# Usage (CLI):
#   dotnet run --project src/GnOuGo.Flow.Cli -- run examples/configure-providers.yaml
#   dotnet run --project src/GnOuGo.Flow.Cli -- run examples/configure-providers.yaml --input command=/llm
#   dotnet run --project src/GnOuGo.Flow.Cli -- run examples/configure-providers.yaml --input command=/mcp
#   dotnet run --project src/GnOuGo.Flow.Cli -- run examples/configure-providers.yaml --input command=/status

version: 1
name: configure-providers
skill:
  description: Interactive slash-command wizard for configuring LLM providers and MCP servers.
  tags: [configuration, providers, mcp, llm]
  inputs:
    command:
      type: string
      description: Slash-command to execute, such as /llm, /mcp, or /status.
  outputs:
    status:
      type: string
      description: Configuration workflow status.
meta:
  author: GnOuGo.Flow
  description: >
    Interactive setup wizard triggered by slash-commands.
    Supports LLM provider configuration (API Key, OpenID Connect, Copilot env),
    MCP server configuration (HTTP, stdio), and status display.

workflows:
  main:
    inputs:
      command:
        type: string
        required: false
        default: ""
        description: >
          Slash-command to execute: /llm, /mcp, /status.
          Leave empty to see the list of available commands.

    steps:
      # ════════════════════════════════════════════════════════════════
      # RESOLVE — normalize the command (handles both flat and nested inputs)
      # ════════════════════════════════════════════════════════════════

      # Supports:  command: /llm   (correct)
      #            inputs:\n  command: /llm   (common user mistake)
      - id: resolve_command
        type: set
        input:
          cmd: "${lower(trim(data.inputs.command ?? data.inputs.inputs?.command ?? ''))}"

      - id: debug_cmd
        type: emit
        input:
          message: "🔍 Detected command: \"${data.steps.resolve_command.cmd}\""
          level: thinking

      # ════════════════════════════════════════════════════════════════
      # ROUTER — dispatch based on resolved command
      # ════════════════════════════════════════════════════════════════

      - id: route
        type: switch
        expr: "${data.steps.resolve_command.cmd}"
        cases:
          # ── /llm ──
          - value: "/llm"
            steps:
              - id: llm_flow
                type: workflow.call
                input:
                  ref: { kind: local, name: configure_llm }
                  args: {}

          # ── /mcp ──
          - value: "/mcp"
            steps:
              - id: mcp_flow
                type: workflow.call
                input:
                  ref: { kind: local, name: configure_mcp }
                  args: {}

          # ── /status ──
          - value: "/status"
            steps:
              - id: status_flow
                type: workflow.call
                input:
                  ref: { kind: local, name: show_status }
                  args: {}

        # ── (empty or unknown) → show help ──
        default:
          - id: help_text
            type: template.render
            input:
              engine: mustache
              template: |
                # 🔧 GnOuGo Configuration Wizard

                Available commands:

                | Command     | Description                                          |
                |-------------|------------------------------------------------------|
                | `/llm`      | Configure an LLM provider (OpenAI, Ollama, Copilot) |
                | `/mcp`      | Add an MCP server (HTTP or stdio)                    |
                | `/status`   | Display current configuration summary                |

                **Authentication modes for LLM providers:**
                - **API Key** — static secret (OpenAI, custom endpoints)
                - **OpenID Connect** — OAuth2 client_credentials flow (issuer, client_id, scopes, client_secret or private_key)
                - **Copilot / Env** — resolved from `GITHUB_TOKEN` or `COPILOT_API_KEY` environment variables

                **Usage (Inputs panel):**
                ```yaml
                command: /llm
                ```
                ⚠️ Do **not** nest under `inputs:` — just type `command: /llm` directly.

                **Usage (CLI):**
                ```
                --input command=/llm
                ```
              data: {}
              mode: text

          - id: emit_help
            type: emit
            input:
              message: "${data.steps.help_text.text}"
              level: response

    outputs:
      command:
        expr: "${data.inputs.command}"
        type: string
        description: "The command that was executed"
      help:
        expr: "${data.steps.help_text?.text ?? null}"
        type: string
        description: "Help text (only when no command was given)"
      llm_config:
        expr: "${data.steps.llm_flow?.outputs ?? null}"
        type: any
        description: "LLM provider configuration result (from /llm)"
      mcp_config:
        expr: "${data.steps.mcp_flow?.outputs ?? null}"
        type: any
        description: "MCP server configuration result (from /mcp)"
      status:
        expr: "${data.steps.status_flow?.outputs ?? null}"
        type: any
        description: "Status display result (from /status)"

  # ══════════════════════════════════════════════════════════════════
  # SUB-WORKFLOW: /llm — Configure LLM Provider
  # ══════════════════════════════════════════════════════════════════
  configure_llm:
    inputs: {}

    steps:
      - id: think_start
        type: emit
        input:
          message: "🤖 Starting LLM provider configuration…"
          level: thinking

      # ── Step 1: Choose provider type ──
      - id: choose_provider
        type: human.input
        input:
          mode: choice
          prompt: "Select the LLM provider to configure:"
          choices:
            - openai
            - ollama
            - copilot
          timeout_ms: 36000000

      # ── Step 2: Provider-specific defaults ──
      - id: provider_defaults
        type: switch
        expr: "${data.steps.choose_provider.response}"
        cases:
          - value: "openai"
            steps:
              - id: defaults_openai
                type: set
                input:
                  default_url: "https://api.openai.com/v1"
                  default_model: "gpt-4o"
                  auth_modes: "api_key, oidc"
          - value: "ollama"
            steps:
              - id: defaults_ollama
                type: set
                input:
                  default_url: "http://localhost:11434"
                  default_model: "llama3"
                  auth_modes: "none"
          - value: "copilot"
            steps:
              - id: defaults_copilot
                type: set
                input:
                  default_url: "https://models.github.ai/inference"
                  default_model: "gpt-4o"
                  auth_modes: "api_key, copilot_env, oidc"

      - id: resolved_defaults
        type: set
        input:
          url: "${data.steps.defaults_openai?.default_url ?? data.steps.defaults_ollama?.default_url ?? data.steps.defaults_copilot?.default_url ?? ''}"
          model: "${data.steps.defaults_openai?.default_model ?? data.steps.defaults_ollama?.default_model ?? data.steps.defaults_copilot?.default_model ?? ''}"
          auth_modes: "${data.steps.defaults_openai?.auth_modes ?? data.steps.defaults_ollama?.auth_modes ?? data.steps.defaults_copilot?.auth_modes ?? 'none'}"

      - id: think_defaults
        type: emit
        input:
          message: "📡 Provider: ${data.steps.choose_provider.response} | URL: ${data.steps.resolved_defaults.url} | Auth: ${data.steps.resolved_defaults.auth_modes}"
          level: info

      # ── Step 3: Connection details ──
      - id: configure_connection
        type: human.input
        input:
          mode: form
          prompt: "Configure ${data.steps.choose_provider.response} connection. Adjust defaults if needed:"
          context: "Default URL: ${data.steps.resolved_defaults.url} | Default model: ${data.steps.resolved_defaults.model}"
          fields:
            - name: url
              type: string
              required: true
              description: "Provider endpoint URL"
              default: "${data.steps.resolved_defaults.url}"
            - name: model
              type: string
              required: true
              description: "Default model name"
              default: "${data.steps.resolved_defaults.model}"
          timeout_ms: 36000000

      # ── Step 4: Auth mode (skip for ollama) ──
      - id: auth_branch
        type: switch
        cases:
          # Ollama: no auth needed
          - when: "${data.steps.choose_provider.response == 'ollama'}"
            steps:
              - id: auth_none
                type: set
                input:
                  auth_type: "none"
                  api_key: ""
                  oidc_issuer: ""
                  oidc_client_id: ""
                  oidc_scopes: ""
                  oidc_client_secret: ""
                  oidc_private_key_pem: ""

        default:
          # Ask auth mode
          - id: choose_auth
            type: human.input
            input:
              mode: choice
              prompt: "Choose authentication mode for ${data.steps.choose_provider.response}:"
              context: "Available: ${data.steps.resolved_defaults.auth_modes}"
              choices:
                - api_key
                - oidc
                - copilot_env
              timeout_ms: 36000000

          - id: auth_mode_branch
            type: switch
            cases:
              # ── API Key ──
              - when: "${data.steps.choose_auth.response == 'api_key'}"
                steps:
                  - id: input_api_key
                    type: human.input
                    input:
                      mode: form
                      prompt: "Enter the API key:"
                      fields:
                        - name: api_key
                          type: string
                          required: true
                          description: "API key (will be stored encrypted at rest)"
                      timeout_ms: 36000000
                  - id: auth_apikey
                    type: set
                    input:
                      auth_type: "api_key"
                      api_key: "${data.steps.input_api_key.api_key}"
                      oidc_issuer: ""
                      oidc_client_id: ""
                      oidc_scopes: ""
                      oidc_client_secret: ""
                      oidc_private_key_pem: ""

              # ── OpenID Connect ──
              - when: "${data.steps.choose_auth.response == 'oidc'}"
                steps:
                  - id: input_oidc
                    type: human.input
                    input:
                      mode: form
                      prompt: "Configure OpenID Connect (client_credentials):"
                      fields:
                        - name: issuer
                          type: string
                          required: true
                          description: "OIDC Issuer URL (e.g. https://login.microsoftonline.com/{tenant}/v2.0)"
                        - name: client_id
                          type: string
                          required: true
                          description: "OAuth2 Client ID"
                        - name: scopes
                          type: string
                          required: true
                          description: "Space-separated scopes (e.g. api://my-api/.default)"
                        - name: client_secret
                          type: string
                          required: false
                          description: "Client secret (leave empty to use private key)"
                        - name: private_key_pem
                          type: string
                          required: false
                          description: "RSA private key PEM content (alternative to client_secret)"
                      timeout_ms: 36000000
                  - id: auth_oidc
                    type: set
                    input:
                      auth_type: "oidc"
                      api_key: ""
                      oidc_issuer: "${data.steps.input_oidc.issuer}"
                      oidc_client_id: "${data.steps.input_oidc.client_id}"
                      oidc_scopes: "${data.steps.input_oidc.scopes}"
                      oidc_client_secret: "${data.steps.input_oidc.client_secret ?? ''}"
                      oidc_private_key_pem: "${data.steps.input_oidc.private_key_pem ?? ''}"

            # ── Copilot Env (default) ──
            default:
              - id: auth_copilot_env
                type: set
                input:
                  auth_type: "copilot_env"
                  api_key: ""
                  oidc_issuer: ""
                  oidc_client_id: ""
                  oidc_scopes: ""
                  oidc_client_secret: ""
                  oidc_private_key_pem: ""
              - id: think_copilot_env
                type: emit
                input:
                  message: "🔑 Auth via GITHUB_TOKEN or COPILOT_API_KEY env variable."
                  level: info

      # ── Merge auth result ──
      - id: final_auth
        type: set
        input:
          auth_type: "${data.steps.auth_none?.auth_type ?? data.steps.auth_apikey?.auth_type ?? data.steps.auth_oidc?.auth_type ?? data.steps.auth_copilot_env?.auth_type ?? 'none'}"
          api_key: "${data.steps.auth_none?.api_key ?? data.steps.auth_apikey?.api_key ?? data.steps.auth_oidc?.api_key ?? data.steps.auth_copilot_env?.api_key ?? ''}"
          oidc_issuer: "${data.steps.auth_none?.oidc_issuer ?? data.steps.auth_apikey?.oidc_issuer ?? data.steps.auth_oidc?.oidc_issuer ?? data.steps.auth_copilot_env?.oidc_issuer ?? ''}"
          oidc_client_id: "${data.steps.auth_none?.oidc_client_id ?? data.steps.auth_apikey?.oidc_client_id ?? data.steps.auth_oidc?.oidc_client_id ?? data.steps.auth_copilot_env?.oidc_client_id ?? ''}"
          oidc_scopes: "${data.steps.auth_none?.oidc_scopes ?? data.steps.auth_apikey?.oidc_scopes ?? data.steps.auth_oidc?.oidc_scopes ?? data.steps.auth_copilot_env?.oidc_scopes ?? ''}"
          oidc_client_secret: "${data.steps.auth_none?.oidc_client_secret ?? data.steps.auth_apikey?.oidc_client_secret ?? data.steps.auth_oidc?.oidc_client_secret ?? data.steps.auth_copilot_env?.oidc_client_secret ?? ''}"
          oidc_private_key_pem: "${data.steps.auth_none?.oidc_private_key_pem ?? data.steps.auth_apikey?.oidc_private_key_pem ?? data.steps.auth_oidc?.oidc_private_key_pem ?? data.steps.auth_copilot_env?.oidc_private_key_pem ?? ''}"

      # ── Build summary ──
      - id: llm_summary
        type: template.render
        input:
          engine: mustache
          template: |
            ## ✅ LLM Provider Configured

            | Field          | Value                    |
            |----------------|--------------------------|
            | Provider       | {{provider}}             |
            | URL            | {{url}}                  |
            | Model          | {{model}}                |
            | Auth           | {{auth_type}}            |
            {{#has_key}}| API Key        | ••••••••                 |
            {{/has_key}}{{#has_oidc}}| OIDC Issuer    | {{oidc_issuer}}          |
            | OIDC Client ID | {{oidc_client_id}}       |
            | OIDC Scopes    | {{oidc_scopes}}          |
            | OIDC Secret    | {{oidc_secret_status}}   |
            {{/has_oidc}}
          data:
            provider: "${data.steps.choose_provider.response}"
            url: "${data.steps.configure_connection.url}"
            model: "${data.steps.configure_connection.model}"
            auth_type: "${data.steps.final_auth.auth_type}"
            has_key: "${data.steps.final_auth.api_key != ''}"
            has_oidc: "${data.steps.final_auth.auth_type == 'oidc'}"
            oidc_issuer: "${data.steps.final_auth.oidc_issuer}"
            oidc_client_id: "${data.steps.final_auth.oidc_client_id}"
            oidc_scopes: "${data.steps.final_auth.oidc_scopes}"
            oidc_secret_status: "${data.steps.final_auth.oidc_client_secret != '' ? '••••••••' : (data.steps.final_auth.oidc_private_key_pem != '' ? '(private key)' : '(none)')}"
          mode: text

      - id: emit_llm_summary
        type: emit
        input:
          message: "${data.steps.llm_summary.text}"
          level: response

      # ── Confirm ──
      - id: confirm_llm
        type: human.input
        input:
          mode: choice
          prompt: "Save this LLM provider configuration?"
          context: "${data.steps.llm_summary.text}"
          choices:
            - save
            - discard
          timeout_ms: 36000000

      - id: save_result
        type: set
        input:
          saved: "${data.steps.confirm_llm.response == 'save'}"

      - id: think_llm_done
        type: emit
        input:
          message: "${data.steps.save_result.saved ? '💾 LLM configuration saved.' : '❌ LLM configuration discarded.'}"
          level: progress

    outputs:
      saved:
        expr: "${data.steps.save_result.saved}"
        type: boolean
        description: "Whether the configuration was saved"
      provider:
        expr: "${data.steps.choose_provider.response}"
        type: string
        description: "Provider key (openai, ollama, copilot)"
      url:
        expr: "${data.steps.configure_connection.url}"
        type: string
        description: "Provider endpoint URL"
      model:
        expr: "${data.steps.configure_connection.model}"
        type: string
        description: "Default model name"
      auth_type:
        expr: "${data.steps.final_auth.auth_type}"
        type: string
        description: "Auth mode: none, api_key, oidc, copilot_env"
      api_key:
        expr: "${data.steps.final_auth.api_key}"
        type: string
        description: "API key (encrypted at rest)"
      oidc:
        expr: "${data.steps.final_auth.auth_type == 'oidc' ? json(data.steps.final_auth) : null}"
        type: object
        properties:
          oidc_issuer: { type: string, description: "OIDC Issuer URL" }
          oidc_client_id: { type: string, description: "OAuth2 Client ID" }
          oidc_scopes: { type: string, description: "Space-separated scopes" }
          oidc_client_secret: { type: string, description: "Client secret (encrypted)" }
          oidc_private_key_pem: { type: string, description: "RSA private key PEM (encrypted)" }
        description: "OIDC configuration (null if auth_type != oidc)"

  # ══════════════════════════════════════════════════════════════════
  # SUB-WORKFLOW: /mcp — Configure MCP Server
  # ══════════════════════════════════════════════════════════════════
  configure_mcp:
    inputs: {}

    steps:
      - id: think_start
        type: emit
        input:
          message: "🔌 Starting MCP server configuration…"
          level: thinking

      # ── Step 1: Transport type ──
      - id: choose_transport
        type: human.input
        input:
          mode: choice
          prompt: "What type of MCP server do you want to configure?"
          choices:
            - http
            - stdio
          timeout_ms: 36000000

      - id: transport_branch
        type: switch
        cases:
          # ── HTTP MCP ──
          - when: "${data.steps.choose_transport.response == 'http'}"
            steps:
              - id: configure_http
                type: human.input
                input:
                  mode: form
                  prompt: "Configure the HTTP MCP server:"
                  fields:
                    - name: name
                      type: string
                      required: true
                      description: "Server name (e.g. Github, Jira, Slack)"
                    - name: description
                      type: string
                      required: true
                      description: "Short description of the server's capabilities"
                    - name: url
                      type: string
                      required: true
                      description: "HTTP endpoint URL"
                      default: "https://api.githubcopilot.com/mcp/"
                  timeout_ms: 36000000

              # Auth for HTTP MCP
              - id: http_auth_choice
                type: human.input
                input:
                  mode: choice
                  prompt: "Authentication for this MCP server:"
                  choices:
                    - api_key
                    - oidc
                    - none
                  timeout_ms: 36000000

              - id: http_auth_branch
                type: switch
                cases:
                  - when: "${data.steps.http_auth_choice.response == 'api_key'}"
                    steps:
                      - id: http_input_key
                        type: human.input
                        input:
                          mode: form
                          prompt: "Enter the API key for this MCP server:"
                          fields:
                            - name: api_key
                              type: string
                              required: true
                              description: "API key / bearer token"
                          timeout_ms: 36000000
                      - id: http_auth_key
                        type: set
                        input:
                          auth_type: "api_key"
                          api_key: "${data.steps.http_input_key.api_key}"
                          oidc_issuer: ""
                          oidc_client_id: ""
                          oidc_scopes: ""
                          oidc_client_secret: ""

                  - when: "${data.steps.http_auth_choice.response == 'oidc'}"
                    steps:
                      - id: http_input_oidc
                        type: human.input
                        input:
                          mode: form
                          prompt: "Configure OpenID Connect for this MCP server:"
                          fields:
                            - name: issuer
                              type: string
                              required: true
                              description: "OIDC Issuer URL"
                            - name: client_id
                              type: string
                              required: true
                              description: "OAuth2 Client ID"
                            - name: scopes
                              type: string
                              required: true
                              description: "Space-separated scopes"
                            - name: client_secret
                              type: string
                              required: false
                              description: "Client secret (leave empty to use private key)"
                          timeout_ms: 36000000
                      - id: http_auth_oidc
                        type: set
                        input:
                          auth_type: "oidc"
                          api_key: ""
                          oidc_issuer: "${data.steps.http_input_oidc.issuer}"
                          oidc_client_id: "${data.steps.http_input_oidc.client_id}"
                          oidc_scopes: "${data.steps.http_input_oidc.scopes}"
                          oidc_client_secret: "${data.steps.http_input_oidc.client_secret ?? ''}"

                default:
                  - id: http_auth_none
                    type: set
                    input:
                      auth_type: "none"
                      api_key: ""
                      oidc_issuer: ""
                      oidc_client_id: ""
                      oidc_scopes: ""
                      oidc_client_secret: ""

              - id: http_result
                type: set
                input:
                  name: "${data.steps.configure_http.name}"
                  transport: "http"
                  description: "${data.steps.configure_http.description}"
                  url: "${data.steps.configure_http.url}"
                  command: ""
                  args: ""
                  auth_type: "${data.steps.http_auth_key?.auth_type ?? data.steps.http_auth_oidc?.auth_type ?? data.steps.http_auth_none?.auth_type ?? 'none'}"
                  api_key: "${data.steps.http_auth_key?.api_key ?? ''}"
                  oidc_issuer: "${data.steps.http_auth_oidc?.oidc_issuer ?? ''}"
                  oidc_client_id: "${data.steps.http_auth_oidc?.oidc_client_id ?? ''}"
                  oidc_scopes: "${data.steps.http_auth_oidc?.oidc_scopes ?? ''}"
                  oidc_client_secret: "${data.steps.http_auth_oidc?.oidc_client_secret ?? ''}"

        # ── STDIO MCP ──
        default:
          - id: configure_stdio
            type: human.input
            input:
              mode: form
              prompt: "Configure the stdio MCP server:"
              fields:
                - name: name
                  type: string
                  required: true
                  description: "Server name (e.g. Browser, Cmd, Agent)"
                - name: description
                  type: string
                  required: true
                  description: "Short description of the server's capabilities"
                - name: command
                  type: string
                  required: true
                  description: "Command to execute"
                  default: "dotnet"
                - name: args
                  type: string
                  required: true
                  description: "Arguments (comma-separated)"
                  default: "run,--project,C:/path/to/project.csproj"
              timeout_ms: 36000000

          - id: stdio_result
            type: set
            input:
              name: "${data.steps.configure_stdio.name}"
              transport: "stdio"
              description: "${data.steps.configure_stdio.description}"
              url: ""
              command: "${data.steps.configure_stdio.command}"
              args: "${data.steps.configure_stdio.args}"
              auth_type: "none"
              api_key: ""
              oidc_issuer: ""
              oidc_client_id: ""
              oidc_scopes: ""
              oidc_client_secret: ""

      # ── Merge result ──
      - id: final_mcp
        type: set
        input:
          name: "${data.steps.http_result?.name ?? data.steps.stdio_result?.name ?? ''}"
          transport: "${data.steps.http_result?.transport ?? data.steps.stdio_result?.transport ?? ''}"
          description: "${data.steps.http_result?.description ?? data.steps.stdio_result?.description ?? ''}"
          url: "${data.steps.http_result?.url ?? data.steps.stdio_result?.url ?? ''}"
          command: "${data.steps.http_result?.command ?? data.steps.stdio_result?.command ?? ''}"
          args: "${data.steps.http_result?.args ?? data.steps.stdio_result?.args ?? ''}"
          auth_type: "${data.steps.http_result?.auth_type ?? data.steps.stdio_result?.auth_type ?? 'none'}"
          api_key: "${data.steps.http_result?.api_key ?? data.steps.stdio_result?.api_key ?? ''}"
          oidc_issuer: "${data.steps.http_result?.oidc_issuer ?? data.steps.stdio_result?.oidc_issuer ?? ''}"
          oidc_client_id: "${data.steps.http_result?.oidc_client_id ?? data.steps.stdio_result?.oidc_client_id ?? ''}"
          oidc_scopes: "${data.steps.http_result?.oidc_scopes ?? data.steps.stdio_result?.oidc_scopes ?? ''}"
          oidc_client_secret: "${data.steps.http_result?.oidc_client_secret ?? data.steps.stdio_result?.oidc_client_secret ?? ''}"

      # ── Summary ──
      - id: mcp_summary
        type: template.render
        input:
          engine: mustache
          template: |
            ## ✅ MCP Server Configured

            | Field       | Value                    |
            |-------------|--------------------------|
            | Name        | {{name}}                 |
            | Transport   | {{transport}}            |
            | Description | {{description}}          |
            {{#has_url}}| URL         | {{url}}                  |
            {{/has_url}}{{#has_cmd}}| Command     | {{command}}              |
            | Args        | {{args}}                 |
            {{/has_cmd}}| Auth        | {{auth_type}}            |
            {{#has_key}}| API Key     | ••••••••                 |
            {{/has_key}}{{#has_oidc}}| OIDC Issuer | {{oidc_issuer}}          |
            | Client ID   | {{oidc_client_id}}       |
            | Scopes      | {{oidc_scopes}}          |
            {{/has_oidc}}
          data:
            name: "${data.steps.final_mcp.name}"
            transport: "${data.steps.final_mcp.transport}"
            description: "${data.steps.final_mcp.description}"
            has_url: "${data.steps.final_mcp.url != ''}"
            url: "${data.steps.final_mcp.url}"
            has_cmd: "${data.steps.final_mcp.command != ''}"
            command: "${data.steps.final_mcp.command}"
            args: "${data.steps.final_mcp.args}"
            auth_type: "${data.steps.final_mcp.auth_type}"
            has_key: "${data.steps.final_mcp.api_key != ''}"
            has_oidc: "${data.steps.final_mcp.auth_type == 'oidc'}"
            oidc_issuer: "${data.steps.final_mcp.oidc_issuer}"
            oidc_client_id: "${data.steps.final_mcp.oidc_client_id}"
            oidc_scopes: "${data.steps.final_mcp.oidc_scopes}"
          mode: text

      - id: emit_mcp_summary
        type: emit
        input:
          message: "${data.steps.mcp_summary.text}"
          level: response

      # ── Confirm ──
      - id: confirm_mcp
        type: human.input
        input:
          mode: choice
          prompt: "Save this MCP server configuration?"
          context: "${data.steps.mcp_summary.text}"
          choices:
            - save
            - discard
          timeout_ms: 36000000

      - id: save_result
        type: set
        input:
          saved: "${data.steps.confirm_mcp.response == 'save'}"

      - id: think_mcp_done
        type: emit
        input:
          message: "${data.steps.save_result.saved ? '💾 MCP server saved.' : '❌ MCP server discarded.'}"
          level: progress

    outputs:
      saved:
        expr: "${data.steps.save_result.saved}"
        type: boolean
        description: "Whether the configuration was saved"
      server:
        expr: "${json(data.steps.final_mcp)}"
        type: object
        properties:
          name: { type: string, description: "Server name" }
          transport: { type: string, description: "Transport type (http, stdio)" }
          description: { type: string, description: "Server description" }
          url: { type: string, description: "HTTP endpoint URL (empty for stdio)" }
          command: { type: string, description: "Command (empty for http)" }
          args: { type: string, description: "Comma-separated arguments (empty for http)" }
          auth_type: { type: string, description: "Auth mode: none, api_key, oidc" }
        description: "Full MCP server configuration"

  # ══════════════════════════════════════════════════════════════════
  # SUB-WORKFLOW: /status — Show current config
  # ══════════════════════════════════════════════════════════════════
  show_status:
    inputs: {}

    steps:
      - id: status_text
        type: template.render
        input:
          engine: mustache
          template: |
            # 📊 Current Configuration Status

            > This is a demo workflow — in a real deployment, this would read
            > from the persisted configuration store (SQLite / KeyVault).

            ## 🤖 LLM Providers (from appsettings)

            | Provider | URL                                  | Type    | Auth     |
            |----------|--------------------------------------|---------|----------|
            | OpenAI   | https://api.openai.com/v1            | openai  | api_key  |
            | Ollama   | http://localhost:11434               | ollama  | none     |
            | Copilot  | https://models.github.ai/inference   | copilot | env/oidc |

            ## 🔌 MCP Servers (from appsettings)

            | Server             | Type  | Auth     | Description                              |
            |--------------------|-------|----------|------------------------------------------|
            | Github             | http  | api_key  | GitHub repository automation             |
            | GnOuGo.Browser.Mcp | stdio | none    | Web navigation via Playwright.NET        |
            | GnOuGo.Cmd.Mcp    | stdio | none     | Secure allowlisted command execution     |
            | GnOuGo.Agent.Mcp  | stdio | none   | User chat history & agent store via MCP  |

            ## 🔐 Supported Auth Modes

            | Mode         | Description                                                 |
            |--------------|-------------------------------------------------------------|
            | `api_key`    | Static API key / bearer token                               |
            | `oidc`       | OpenID Connect client_credentials (issuer, client_id, etc.) |
            | `copilot_env`| GITHUB_TOKEN or COPILOT_API_KEY environment variable        |
            | `none`       | No authentication required                                  |

            ---
            Use `/llm` to configure a provider or `/mcp` to add a server.
          data: {}
          mode: text

      - id: emit_status
        type: emit
        input:
          message: "${data.steps.status_text.text}"
          level: response

    outputs:
      text:
        expr: "${data.steps.status_text.text}"
        type: string
        description: "Status display text"
