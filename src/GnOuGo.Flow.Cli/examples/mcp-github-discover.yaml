dsl: 1
name: mcp-github-discover
meta:
  description: >
    Discovers all tools exposed by the GitHub Copilot MCP server.
    Requires a valid GitHub token in appsettings.json (LLM.McpServers.Github.ApiKey).

    Usage:
      gnougo-flow run examples/mcp-github-discover.yaml

workflows:
  main:
    steps:
      # ── Discover all tools from GitHub MCP ──
      - id: discover
        type: mcp.list
        input:
          server: Github
          include:
            - tools

    outputs:
      tool_count:
        expr: "${len(data.steps.discover.tools)}"
        type: number
        description: Number of GitHub tools discovered
      tools_text:
        expr: "${data.steps.discover.text}"
        type: string
        description: Text description of discovered tools

