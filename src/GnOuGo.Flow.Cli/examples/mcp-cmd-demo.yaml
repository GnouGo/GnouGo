dsl: 1
name: mcp-cmd-demo
meta:
  description: >
    Démonstration du serveur MCP sécurisé GnOuGo.Flow.Cmd.
    Le workflow liste les commandes autorisées, lit la policy, exécute
    quelques alias sûrs et retourne leurs sorties.

    Usage :
      dotnet run --project src/GnOuGo.Flow.Cli/GnOuGo.Flow.Cli.csproj -- run src/GnOuGo.Flow.Cli/examples/mcp-cmd-demo.yaml

workflows:
  main:
    inputs:
      cmd_server:
        type: string
        default: GnOuGo.Flow.Cmd
        description: Name of the MCP command server
      relative_path:
        type: string
        default: src/GnOuGo.Flow.Cmd
        description: Relative path to list via the command server

    steps:
      - id: discover_cmd_tools
        type: mcp.list
        input:
          server: "${data.inputs.cmd_server}"
          include:
            - tools

      - id: read_policy
        type: mcp.call
        input:
          server: "${data.inputs.cmd_server}"
          method: cmd_get_policy

      - id: list_allowed
        type: mcp.call
        input:
          server: "${data.inputs.cmd_server}"
          method: cmd_list_allowed_commands

      - id: print_pwd
        type: mcp.call
        input:
          server: "${data.inputs.cmd_server}"
          method: cmd_run
          request:
            commandName: print_working_directory

      - id: list_src
        type: mcp.call
        input:
          server: "${data.inputs.cmd_server}"
          method: cmd_run
          request:
            commandName: list_src

      - id: list_relative
        type: mcp.call
        input:
          server: "${data.inputs.cmd_server}"
          method: cmd_run
          request:
            commandName: list_relative_path
            parametersJson: "${json({ path: data.inputs.relative_path })}"
            timeoutMs: 15000

    outputs:
      tool_count:
        expr: "${len(data.steps.discover_cmd_tools.tools)}"
        type: number
        description: Number of command tools discovered
      policy:
        expr: "${data.steps.read_policy.response}"
        type: object
        description: Command execution policy
      allowed_commands:
        expr: "${data.steps.list_allowed.response.commands}"
        type: array
        description: List of allowed commands
      pwd_result:
        expr: "${data.steps.print_pwd.response}"
        type: object
        description: Current working directory
      list_src_result:
        expr: "${data.steps.list_src.response}"
        type: object
        description: Directory listing of src
      list_relative_result:
        expr: "${data.steps.list_relative.response}"
        type: object
        description: Relative directory listing



