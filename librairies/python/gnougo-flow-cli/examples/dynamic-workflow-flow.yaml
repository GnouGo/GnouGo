version: 1
name: dynamic-workflow-agent
meta:
  description: |
    Dynamic agent demo:
    - discover MCP capabilities
    - human review loop for approach
    - generate workflow via workflow.plan
    - execute generated workflow via workflow.execute

workflows:
  main:
    inputs:
      task:
        type: string
        required: true
    steps:
    
      - id: generate
        type: workflow.plan
        input:
          generator:
            model: gpt-5.4
            instruction: >
              Build a workflow named generated that solves this task:
              ${data.inputs.task}
              
          policy:
            denied_step_types: [workflow.plan]
            allow_remote_workflow_refs: false
          limits:
            max_steps_total: 100
          validate:
            compile: true
            dry_run: true
          on_invalid:
            action: reprompt
            max_attempts: 3

      - id: run
        type: workflow.execute
        input:
          from_step: generate

      - id: format
        type: llm.call
        input:
          model: gpt-5.4
          prompt: >
            User task: ${data.inputs.task}

            Generated workflow output:
            ${json(data.steps.run.outputs)}

            Return a concise markdown answer.

    outputs:
      answer: "${data.steps.format.text}"
      approved_approach: "${data.steps.analyze.text}"
      generated_yaml: "${data.steps.generate.yaml}"
      review_iterations: "${data.steps.review_loop.count}"


