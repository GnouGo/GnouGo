version: 1
name: dynamic-workflow-agent
meta:
  description: |
    Dynamic agent demo:
    - discover MCP capabilities
    - human review loop for approach
    - generate workflow via workflow.plan
    - execute generated workflow via workflow.execute

workflows:
  main:
    inputs:
      task:
        type: string
        required: true
    steps:
      - id: discover_mcp
        type: mcp.list
        input:
          servers: ["*"]
          include: [tools, prompts, resources]

      - id: review_loop
        type: loop.sequential
        input:
          while: "${!exists(data.steps.review) || data.steps.review.response != 'approve'}"
          max_times: 5
        steps:
          - id: analyze
            type: llm.call
            input:
              model: gpt-5.4-mini
              temperature: 0.7
              prompt: >
                Analyze task and propose a concise markdown plan in 3-7 steps.
                Task: ${data.inputs.task}

                MCP capabilities:
                ${data.steps.discover_mcp.text}

                User feedback (if any, null when absent):
                ${json(data.steps.feedback)}

          - id: review
            type: human.input
            input:
              mode: choice
              prompt: "Approve this approach?"
              context: "${data.steps.analyze.text}"
              choices: [approve, modify]

          - id: feedback
            type: human.input
            if: "${data.steps.review.response == 'modify'}"
            input:
              mode: text
              prompt: "What should be improved?"

      - id: generate
        type: workflow.plan
        input:
          generator:
            model: gpt-5.4
            instruction: >
              Build a workflow named generated that solves this task:
              ${data.inputs.task}

              Follow this approved approach:
              ${data.steps.analyze.text}

              Available MCP capabilities:
              ${data.steps.discover_mcp.text}
          policy:
            denied_step_types: [workflow.plan]
            allow_remote_workflow_refs: false
          limits:
            max_steps_total: 20
          on_invalid:
            action: reprompt
            max_attempts: 3

      - id: run
        type: workflow.execute
        input:
          from_step: generate

      - id: format
        type: llm.call
        input:
          model: gpt-5.4
          prompt: >
            User task: ${data.inputs.task}

            Generated workflow output:
            ${json(data.steps.run.outputs)}

            Return a concise markdown answer.

    outputs:
      answer: "${data.steps.format.text}"
      approved_approach: "${data.steps.analyze.text}"
      generated_yaml: "${data.steps.generate.yaml}"
      review_iterations: "${data.steps.review_loop.count}"



